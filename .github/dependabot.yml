version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      tree-sitter:
        patterns:
          - "github.com/tree-sitter/*"
      all-others:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci(deps)"
    open-pull-requests-limit: 5
