name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      # Lint needs the embedded bundle present: internal/embed go:embeds the
      # model and ORT library, so typechecking fails without them. Same cache
      # key as ci.yml, so this is usually a no-op restore.
      - name: Cache dependencies (model + ORT)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: internal/embed/bundle
          key: sense-deps-linux-amd64-${{ hashFiles('scripts/fetch-deps.sh') }}

      - name: Fetch dependencies (model + ORT)
        run: ./scripts/fetch-deps.sh --local

      - name: Lint
        # Same `make lint` a contributor runs locally; golangci-lint is pinned
        # in the Makefile (GOLANGCI_VERSION). This dedicated workflow exists so
        # the README badge reflects lint status alone; ci.yml still runs lint
        # as part of the full `make ci` parity gate.
        run: make lint
