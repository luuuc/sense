name: Smoke Test

# Validates a just-published GitHub Release by downloading the Linux
# amd64 archive and exercising the sense CLI against output assertions.
# Separate from release.yml so a smoke failure doesn't block the release
# itself — operators can diagnose and re-run without re-cutting a tag.

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: Smoke-test released binary (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download release archive and checksums
        env:
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ARCHIVE="sense_${VERSION}_linux_amd64.tar.gz"
          CHECKSUMS="sense_${VERSION}_checksums.txt"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          echo "Tag: ${TAG}  Version: ${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

          curl -fsSL -o "${ARCHIVE}" "${BASE}/${ARCHIVE}"
          curl -fsSL -o "${CHECKSUMS}" "${BASE}/${CHECKSUMS}"

          # Verify checksum before running anything from the archive.
          EXPECTED="$(grep -F "${ARCHIVE}" "${CHECKSUMS}" | awk '{print $1}')"
          ACTUAL="$(sha256sum "${ARCHIVE}" | awk '{print $1}')"
          if [ -z "$EXPECTED" ] || [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "checksum mismatch: expected=${EXPECTED} actual=${ACTUAL}" >&2
            exit 1
          fi
          echo "Checksum verified."

          tar -xzf "${ARCHIVE}"
          chmod +x ./sense

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Regression gate for release signing: verifies the keyless signature
      # release.yml attached to the checksums file, pinned to this repo's
      # release workflow identity. Catches cosign CLI breaks, identity
      # drift, and signing regressions on every release.
      - name: Verify checksums signature (Sigstore keyless)
        env:
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CHECKSUMS="sense_${VERSION}_checksums.txt"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # The "published" event fires when GoReleaser creates the release;
          # release.yml uploads the signature a few minutes later. Poll.
          for i in $(seq 1 30); do
            if curl -fsSL -o "${CHECKSUMS}.sig" "${BASE}/${CHECKSUMS}.sig" &&
               curl -fsSL -o "${CHECKSUMS}.pem" "${BASE}/${CHECKSUMS}.pem"; then
              break
            fi
            echo "signature assets not published yet (attempt ${i}/30)"
            sleep 10
          done
          test -s "${CHECKSUMS}.sig" && test -s "${CHECKSUMS}.pem"

          cosign verify-blob \
            --certificate-identity-regexp "^https://github.com/${REPO}/\.github/workflows/release\.yml@refs/tags/v.+$" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate "${CHECKSUMS}.pem" \
            --signature "${CHECKSUMS}.sig" \
            "${CHECKSUMS}"

      - name: sense version reports the tagged version
        run: |
          set -euo pipefail
          out="$(./sense version)"
          echo "$out"
          echo "$out" | grep -F "${VERSION}" >/dev/null

      - name: sense help lists the expected subcommands
        run: |
          set -euo pipefail
          out="$(./sense help)"
          echo "$out"
          for sub in scan search graph blast conventions status mcp version; do
            echo "$out" | grep -qE "^\s*${sub}\b" || { echo "help missing: ${sub}" >&2; exit 1; }
          done

      - name: sense scan builds an index from the repo
        run: |
          set -euo pipefail
          SENSE_EMBEDDINGS=false ./sense scan
          ./sense status

      - name: sense graph resolves a known symbol
        run: |
          set -euo pipefail
          out="$(./sense graph Symbol)"
          echo "$out"
