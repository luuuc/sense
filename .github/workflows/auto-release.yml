name: Auto Release

on:
  # Post-CI tagging requires workflow_run; the job only ever checks out
  # trusted main, never PR-controlled code.
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      # Credentials stay persisted: the steps below push the CHANGELOG
      # commit and the release tag to main.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]
        with:
          fetch-depth: 0

      # taiki-e/install-action puts the git-cliff binary on PATH for the
      # plain `run:` steps below. orhun/git-cliff-action only runs git-cliff
      # inside its own sandbox, so bare `git-cliff` calls would not resolve.
      - name: Install git-cliff
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: git-cliff

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          # No `|| echo ""` fallback: a git-cliff failure must fail the run
          # loudly, not masquerade as "no bump needed".
          NEXT=$(git-cliff --bumped-version)
          if [ -z "$NEXT" ] || [ "$NEXT" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump needed (current=$CURRENT, next=$NEXT)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
            echo "Bumping $CURRENT → $NEXT"
          fi

      - name: Generate CHANGELOG
        if: steps.version.outputs.skip == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git-cliff --tag "$TAG" --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG for $TAG"
          git push origin main

      - name: Create tag
        if: steps.version.outputs.skip == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      # GITHUB_TOKEN pushes don't trigger push-based workflows, so we
      # explicitly dispatch release.yml after tagging.
      - name: Trigger release workflow
        if: steps.version.outputs.skip == 'false'
        run: gh workflow run release.yml --ref "$TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
