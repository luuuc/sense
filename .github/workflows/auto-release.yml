name: Auto Release

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # taiki-e/install-action puts the git-cliff binary on PATH for the
      # plain `run:` steps below. orhun/git-cliff-action only runs git-cliff
      # inside its own sandbox, so bare `git-cliff` calls would not resolve.
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          # No `|| echo ""` fallback: a git-cliff failure must fail the run
          # loudly, not masquerade as "no bump needed".
          NEXT=$(git-cliff --bumped-version)
          if [ -z "$NEXT" ] || [ "$NEXT" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump needed (current=$CURRENT, next=$NEXT)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
            echo "Bumping $CURRENT → $NEXT"
          fi

      - name: Generate CHANGELOG
        if: steps.version.outputs.skip == 'false'
        run: |
          git-cliff --tag "${{ steps.version.outputs.tag }}" --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG for ${{ steps.version.outputs.tag }}"
          git push origin main

      - name: Create tag
        if: steps.version.outputs.skip == 'false'
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      # GITHUB_TOKEN pushes don't trigger push-based workflows, so we
      # explicitly dispatch release.yml after tagging.
      - name: Trigger release workflow
        if: steps.version.outputs.skip == 'false'
        run: gh workflow run release.yml --ref "${{ steps.version.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
