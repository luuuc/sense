name: Metrics snapshot

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: metrics
          # Don't leave the token in .git/config; the Commit step pushes with
          # an explicit token-authenticated remote instead.
          persist-credentials: false

      - name: Append daily snapshot
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          day="$(date -u +%F)"
          # --paginate emits one JSON array per page; slurp and merge so each day is ONE row
          gh api --paginate "repos/${REPO}/releases" \
            | jq -c -s --arg day "$day" '{day: $day, kind: "downloads", releases: [add[] | {tag: .tag_name, assets: [.assets[] | {name, download_count}]}]}' >> snapshots.jsonl
          # Traffic endpoints 403 under GITHUB_TOKEN (verified) — they need the METRICS_TOKEN PAT.
          # select(has("count")) drops error bodies so a 403 skips the row instead of writing nulls.
          gh api "repos/${REPO}/traffic/clones" \
            | jq -c --arg day "$day" 'select(has("count")) | {day: $day, kind: "clones"} + .' >> snapshots.jsonl || true
          gh api "repos/${REPO}/traffic/views" \
            | jq -c --arg day "$day" 'select(has("count")) | {day: $day, kind: "views"} + .' >> snapshots.jsonl || true

      - name: Commit
        env:
          # Push needs contents:write, which the workflow's GITHUB_TOKEN has.
          # METRICS_TOKEN is a read-scoped PAT (traffic API only) and 403s on push.
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots.jsonl
          git commit -m "metrics: snapshot $(date -u +%F)"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" HEAD:metrics
