name: Propose an AI-tool integration
description: A new AI coding-tool integration, or tuning an existing one's guidance
labels: ["lane: ai-tool"]
body:
  - type: markdown
    attributes:
      value: |
        Guide: [CONTRIBUTING-AN-AI-TOOL.md](https://github.com/luuuc/sense/blob/main/CONTRIBUTING-AN-AI-TOOL.md).
        MCP server config alone often does not steer a tool. The guidance file it reads (for example AGENTS.md) is load-bearing.
  - type: input
    id: tool
    attributes:
      label: Tool
      placeholder: "e.g. Aider, Zed, Continue.dev, JetBrains AI"
    validations:
      required: true
  - type: input
    id: mcp
    attributes:
      label: MCP support
      placeholder: "Does it speak MCP, and over which transport?"
    validations:
      required: true
  - type: input
    id: guidance
    attributes:
      label: Guidance file it reads
      placeholder: "e.g. AGENTS.md, .cursorrules, none"
    validations:
      required: false
