name: Propose framework or dead-code support
description: Framework inference or dead-code idioms on a language Sense already parses
labels: ["lane: framework"]
body:
  - type: markdown
    attributes:
      value: |
        Guide: [CONTRIBUTING-A-FRAMEWORK.md](https://github.com/luuuc/sense/blob/main/CONTRIBUTING-A-FRAMEWORK.md).
        Framework support and dead-code fine-graining are two halves of the same lane.
  - type: input
    id: language
    attributes:
      label: Language (must already be supported)
      placeholder: "e.g. Ruby, PHP, Java, TypeScript"
    validations:
      required: true
  - type: input
    id: framework
    attributes:
      label: Framework
      placeholder: "e.g. Hanami, Symfony, Quarkus, SvelteKit"
    validations:
      required: true
  - type: textarea
    id: idioms
    attributes:
      label: Invisible-reach idioms
      description: Symbols reached by routes, decorators, associations, or DI that look dead today.
    validations:
      required: false
