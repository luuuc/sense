name: Bug Report
description: Report a bug in Sense
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `sense scan` in a Go project
        2. Run `sense graph Foo`
        3. ...
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: Output of `sense version`
      render: shell
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Output of `sense doctor --json`
      render: json
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "e.g. macOS arm64, Ubuntu 22.04 amd64"
    validations:
      required: false
  - type: input
    id: project-size
    attributes:
      label: Project size (approximate file count)
      placeholder: "e.g. ~500 files"
    validations:
      required: false
