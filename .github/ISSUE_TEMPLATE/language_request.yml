name: Propose a language
description: A new tree-sitter language extractor, one of the three open lanes
labels: ["lane: language"]
body:
  - type: markdown
    attributes:
      value: |
        Guide: [CONTRIBUTING-A-LANGUAGE.md](https://github.com/luuuc/sense/blob/main/CONTRIBUTING-A-LANGUAGE.md).
        Standard tier is a ~30-line table-driven declaration. Full tier is a bespoke extractor.
  - type: input
    id: language
    attributes:
      label: Language
      placeholder: "e.g. Zig, Nim, Crystal, OCaml"
    validations:
      required: true
  - type: input
    id: grammar
    attributes:
      label: tree-sitter grammar
      placeholder: "link to the tree-sitter-<lang> repo"
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Intended tier
      options:
        - "Standard (symbols, calls, inheritance, imports)"
        - "Full (adds framework inference)"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this language
      description: Demand, your own use, what it unblocks.
    validations:
      required: false
