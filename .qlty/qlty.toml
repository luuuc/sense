# For a guide to configuration, visit https://qlty.sh/d/config
# Or for a full reference, visit https://qlty.sh/d/qlty-toml
config_version = "0"

# Focus analysis on Sense's product code. Gitignored files are already
# skipped (qlty only analyzes git-tracked files); these exclude tracked
# non-product content.
exclude_patterns = [
  "**/testdata/**",
  "bench/**",
  "docs/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

# Flags functions with >4 returns, which punishes idiomatic Go
# early-return style. 133 of 301 smells were this rule; disabled so the
# maintainability count reflects real signal.
[smells.return_statements]
enabled = false

[[source]]
name = "default"
default = true

# The dead-code voices each register a per-language reason table in init()
# (priority/hint/verify string literals). Structural similarity between those
# data tables is by design — per-language logic stays namespaced, never
# generalized (see CONTRIBUTING.md) — so duplication findings there are noise.
[[triage]]
match.rules = ["qlty:similar-code", "qlty:identical-code"]
match.file_patterns = ["internal/dead/voice_*.go"]
set.ignored = true


# Go linting/formatting is intentionally NOT duplicated here — `make ci`
# (golangci-lint, gofmt, gocyclo/gocognit ledger) is the authority for Go.
# Qlty covers maintainability scoring (smells, duplication, metrics) plus
# the non-Go surfaces: shell, GitHub workflows, secrets, dependency vulns.
[[plugin]]
name = "actionlint"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "zizmor"
