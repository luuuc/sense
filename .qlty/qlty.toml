# For a guide to configuration, visit https://qlty.sh/d/config
# Or for a full reference, visit https://qlty.sh/d/qlty-toml
config_version = "0"

# Focus analysis on Sense's product code. Gitignored files are already
# skipped (qlty only analyzes git-tracked files); these exclude tracked
# non-product content.
exclude_patterns = [
  "**/testdata/**",
  "bench/**",
  "docs/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

# Flags functions with >4 returns, which punishes idiomatic Go
# early-return style. 133 of 301 smells were this rule; disabled so the
# maintainability count reflects real signal.
[smells.return_statements]
enabled = false

# Aligned with the CI-enforced gocognit <= 30 ledger gate (make ledger);
# qlty's default of 15 flags functions the project's policy accepts.
[smells.function_complexity]
threshold = 30

# Per-file TOTAL complexity mostly tracks file length, and funlen is
# deliberately off (raw length is fine). Per-function complexity is already
# gated twice: the CI ledger and function_complexity above.
[smells.file_complexity]
enabled = false

[[source]]
name = "default"
default = true

# The dead-code voices each register a per-language reason table in init()
# (priority/hint/verify string literals). Structural similarity between those
# data tables is by design — per-language logic stays namespaced, never
# generalized (see CONTRIBUTING.md) — so the 5 similar-code findings there are
# noise. No config knob reaches them: the smells engine honors only the
# top-level exclude_patterns, not [[triage]]/[[exclude]] (verified locally,
# 2026-07). Suppressing them needs inline qlty-ignore directives in the
# source files; left visible until that trade-off is decided.


# Go linting/formatting is intentionally NOT duplicated here — `make ci`
# (golangci-lint, gofmt, gocyclo/gocognit ledger) is the authority for Go.
# Qlty covers maintainability scoring (smells, duplication, metrics) plus
# the non-Go surfaces: shell, GitHub workflows, secrets, dependency vulns.
[[plugin]]
name = "actionlint"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "zizmor"
