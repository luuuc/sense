name: data-flow
description: Trace the data flow from an entry point to storage
variables: [entry_point]
prompt_template: |
  Trace the data flow starting from `{entry_point}`. Follow the path
  from HTTP request to the point where data is persisted (database,
  file, or cache). List each function/method in the chain.
  Do not use Explore agents.
  Respond with a JSON object: { "chain": ["file:symbol", ...] }

repos:
  flask:
    entry_point: "Flask.wsgi_app"
    ground_truth_file: ground-truth/flask/data-flow.json
  discourse:
    entry_point: "TopicsController#create"
    ground_truth_file: ground-truth/discourse/data-flow.json
  openproject:
    entry_point: "WorkPackagesController#create"
    ground_truth_file: ground-truth/openproject/data-flow.json
  gin:
    entry_point: "Engine.ServeHTTP"
    ground_truth_file: ground-truth/gin/data-flow.json
  maket:
    entry_point: "OrdersController#create"
    ground_truth_file: ground-truth/maket/data-flow.json
  nextjs:
    entry_point: "NextNodeServer.handleRequest"
    ground_truth_file: ground-truth/nextjs/data-flow.json
  javalin:
    entry_point: "JavalinServlet.service"
    ground_truth_file: ground-truth/javalin/data-flow.json
  axum:
    entry_point: "serve::Serve.poll"
    ground_truth_file: ground-truth/axum/data-flow.json

scoring:
  correctness:
    type: set_match
    match_key: chain
    partial_credit: true
  metrics:
    - tool_calls
    - token_input
    - token_output
    - wall_time
    - misses
    - index_completeness
