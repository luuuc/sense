name: test-file
description: Find the test file for a given source file
variables: [source_file]
prompt_template: |
  What is the test file for `{source_file}`? List the file path and
  the key test functions/methods it contains. Do not use Explore agents.
  Respond with a JSON object: { "test_file": "path/to/test.ext", "test_functions": ["name", ...] }

repos:
  flask:
    source_file: "src/flask/app.py"
    ground_truth_file: ground-truth/flask/test-file.json
  discourse:
    source_file: "lib/post_creator.rb"
    ground_truth_file: ground-truth/discourse/test-file.json
  openproject:
    source_file: "app/models/work_package.rb"
    ground_truth_file: ground-truth/openproject/test-file.json
  gin:
    source_file: "gin.go"
    ground_truth_file: ground-truth/gin/test-file.json
  maket:
    source_file: "app/models/order.rb"
    ground_truth_file: ground-truth/maket/test-file.json
  nextjs:
    source_file: "packages/next/src/server/next-server.ts"
    ground_truth_file: ground-truth/nextjs/test-file.json
  javalin:
    source_file: "javalin/src/main/java/io/javalin/Javalin.java"
    ground_truth_file: ground-truth/javalin/test-file.json
  axum:
    source_file: "axum/src/routing/mod.rs"
    ground_truth_file: ground-truth/axum/test-file.json

scoring:
  correctness:
    type: set_match
    match_key: test_functions
    partial_credit: true
  metrics:
    - tool_calls
    - token_input
    - token_output
    - wall_time
    - misses
    - index_completeness
