# ============================================================================
# V2: THE RETENTION AXIS, fresh session per next-steps.md step 33.
# Supersedes the DEAD dispatch-tracing axis at pebble.yaml.v1-batch-dispatch.bak
# (MEMBER-NAME LAW kill, pebble-batch-groundwork.md) and the earlier
# versionSet seat (the builtin-capture fabrication finding, repos.md). Same
# type (Batch), a DIFFERENT question: not "who dispatches on Batch's erased
# interface calls" but "what RETAINS a Batch, including through interface-typed
# fields": the retention product surface (PR #212/#214) applied to
# pebble for the first time. Full record: pebble-batch-retention-groundwork.md.
#
# ADVERSARY-FIRST (§8-3b): a blind script-writing agent (Gate-Fidelity-law
# compliant, allowed to author/run code, not grep-only) spent 552s / 65 tool
# calls, wrote a custom Go struct/interface scanner, found 26 raw candidates.
# Chasing the same question with 7 chained `sense_blast` calls took under a
# minute and reached the same holder set PLUS four the script missed
# (levelIter/rangeDelIterSetter, mergingIterV2HeapItem, slabState,
# wal.lastWriterInfo/switchableWriter), source-verified. SURVIVES.
#
# HAND-AUDIT (rail c, this session): raw retained_via_interfaces has a REAL
# false-positive rate for common/generic interfaces (InternalIterator has
# dozens of unrelated satisfiers across the LSM engine), every candidate was
# traced to its actual construction site. 6 of 16 raw candidates were cut:
# itertest.probeIterator (test-only), compact.Iter (compaction only ever
# iterates SSTABLES, never a live Batch: compaction.go:2849's pointIter comes
# from newInputIters over compaction inputs), keyspan.InterleavingIter
# (scan_internal.go:1155's only production site wires it to an LSM-level
# merging iterator, never a batch), keyspan.SpanIterOptions (RangeKeyFilters is
