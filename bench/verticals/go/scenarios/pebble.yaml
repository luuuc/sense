description: 'You are a maintainer about to let pebble.Batch objects be pooled and reused
  across operations for lower allocation overhead: once a caller''s deliverable finishes
  with a Batch, it goes back into a pool and gets handed out again with a reset. Before
  that is safe, you must know every place that could still be holding a reference to a
  Batch after the operation that created it appears to be done — because a stale reference
  reading pooled/reused batch data (or worse, a background goroutine still reading it while
  it is reset and handed to someone else) is a silent data-corruption bug. The team can
  already enumerate the DIRECT holders — structs with a field of Batch''s type, or of a
  type that transitively contains one through declared fields (batchIter, indexedBatch,
  the commit-queue slots, the iterator''s batch state). What they cannot see, and what this
  audit must deliver, is the treacherous class: retention hidden behind an abstraction,
  where a production struct stores only an abstract value and the concrete thing put there
  at construction time is a live Batch or something built on top of one. Any one of those
  can keep reading stale batch data after reuse, and a rename-and-recompile audit misses
  every one of them. Work through the tasks below one at a time; each builds on the
  previous one. Keep every answer concrete with file:line so the next agent (and a
  teammate opening the PR) can act without re-exploring the codebase. Deliver the whole
  audit in your replies: do not write notes or reports into repository files — text you do
  not say in a reply does not reach the team.'
steps:
- name: Orient on the handle
  prompt: "Task: orient yourself, briefly. In a few sentences plus file paths: what is this
    project, and where does the write batch type live — the type callers build up writes
    in before committing, the file that defines it, and what the DIRECT holders look like
    (structs with a field literally typed as the batch, or a type that wraps one through a
    declared field)? Keep it short; the map is for the next task, not a deliverable. No
    Explore agents.
    "
  checks:
  - type: word
    value: Batch
    required: true
  - type: contains
    value: batch.go
    required: true
  - type: response_richness
    value: '3'
    required: false
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
- name: Find the retainers hidden behind abstractions
  prompt: "Task: the core of the audit — the retention points a field-type sweep cannot see.
    Some production structs store only an ABSTRACT value — an interface-typed field —
    while the concrete value put there at construction time is a live batch, or something
    built on top of one (an iterator over it, a queued write-ahead-log record referencing
    it). The struct's own definition never names the batch type or any type that contains
    it, so no search for the batch type, and no walk over declared field types, surfaces
    these. Enumerate every such indirect retainer across the WHOLE codebase, in every
    layer: the point-iterator stack, range-key masking, write-ahead-log failover, the
    compaction scheduler, the bench/workload harness. For each, give the file:line of the
    struct, the abstraction it stores, and the concrete carrier that is actually put there,
    plus the file:line of the construction or injection site where you established that —
    a type that merely COULD satisfy the interface somewhere in the codebase is not enough;
    you need the actual site where this specific field gets a batch-derived value in this
    codebase. State each retainer in your reply the moment you establish it — a growing
    list, not a saved-up reveal; an audit that dies with its findings unstated helped
    nobody. An audit values recall first: include every candidate you have evidence for and
    label each row's evidence — what you confirmed at the source versus what a search or
    tool reported that you did not have time to confirm. A silently dropped candidate is
    worse than a labeled unconfirmed one; the team can downgrade a wrong row, but cannot
    recover one you never stated. Where one file defines several such retainers, list every
    one separately. Completeness is the whole point: a missed indirect retainer is a stale
    read waiting to happen.
    "
  checks:
  - type: contains
    value: failover_writer.go
    required: false
  - type: contains
    value: interleaving_iter.go
    required: false
  - type: contains
    value: block_property.go
    required: false
  - type: response_richness
    value: '5'
    required: true
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Produce the indirect-retention risk map
  prompt: "Task: hand off a single audit map a teammate could act on, covering every
    indirect retainer you found. Every row gets: file:line, the abstraction stored, the
    concrete carrier, its likely lifetime class (per-call, per-connection/session, or
    process-long), and whether it plausibly crosses a GOROUTINE boundary from the one that
    created the batch (a background compaction, a flush, the write-ahead-log failover
    monitor thread, a concurrent workload runner) — that crossing is exactly what makes
    pooling dangerous: the creating goroutine can reset and hand the batch to someone else
    while another goroutine is still reading through the retainer. Rank by risk:
    process-long, goroutine-crossing retainers first. Then, for the TOP-RISK rows only,
    prove them: the construction or injection site that pins the concrete carrier, and
    (where applicable) the go-statement or background-loop registration that proves the
    goroutine crossing, each with file:line. Close with what the pooling change must check
    or avoid at those top-risk points. Carry over every retention point from the previous
    step, including the minor or per-call ones; dropping one here is the same as never
    finding it.
    "
  checks:
  - type: contains
    value: failover_manager.go
    required: false
  - type: response_richness
    value: '5'
    required: true
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption

