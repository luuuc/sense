# one hop further (`blast(recordQueue)` or `blast(failoverWriter)`), which
# step 2's "write-ahead-log failover" instruction plausibly elicits but does
# not guarantee. Re-verify this specific row survives the sense arm's actual
# tool use in the dry-run + earlier legacy run transcripts; cut it if the sense arm
# doesn't reliably reach it.
