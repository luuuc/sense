#
# GOLD FIX FROM THE GATE: `dep:ycsb` DROPPED. The adversary's finding A cited
# bench/ycsb.go:258, but it reached that file through `bench.Batch` (a
# DIFFERENT, easier interface: a local `Batch` var inside ycsb.run(), same-
# goroutine, explicitly flagged low-risk by the adversary itself), not through
