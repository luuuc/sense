# (bench.pebbleDB has no Write([]byte) method, type-incompatible with the
# flusher assertion's io.Writer parameter, can't even reach the call site), and
# pebble.levelIter (its rangeDelIterSetter wiring, db.go:1470, always gets a
# freshly-allocated SSTABLE-level mergingIterLevel slot, never the batch's
# dedicated slot at mlevels[0]). The surviving 10 are each hand-verified to a
# real production construction/injection site. Gold below = those 10, deduped
# to 9 files (wal.poppedEntry + wal.recordQueueEntry share wal/failover_writer.go).
#
# WALL: 300s (scorer.py TIME_CEILINGS "pebble" entry, the session driver's
# floor, matching the dolt v3 precedent; applies to BOTH arms).
#
# ⛔→✅ GATE-FIDELITY ADVERSARY DRY-RUN ON THIS FILE'S FINAL WORDING: PASSED
# (same session). Self-timestamped walled run (grep/rg/find/read +
# self-written scripts allowed, honest `date +%s` logging, no hard kill,
# same reconstruction method as dolt's v3 gate): 4 real findings by the 300s
# mark, NONE of which land on the 9-row gold set except one file-level
