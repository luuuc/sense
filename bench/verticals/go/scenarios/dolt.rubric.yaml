# Per-scenario rubric for the LLM judge layer.
#
# Audience block is shared across all steps. Per-step rubrics use the same four
# criteria (map_quality, specificity, justification, uncertainty) with the
# canonical 40/25/20/15 weights. The objective headline is cited_recall on the
# `dependents` group (scored from gold, not the judge); this rubric scores the
# orthogonal answer-quality axes for the AI-agent audience.
#
# Step names MUST match scenarios/dolt.yaml exactly (the judge pairs by name).

audience: |
  An AI coding agent that will use this answer to safely rework how the DoltDB
  handle is obtained and owned in dolt with only small, targeted follow-up
  lookups, not a fresh exploration of the codebase. Score for that audience, not
  a human reader, not a docs page. A perfect answer leaves the agent able to
  impose single ownership knowing every holder outside package doltdb — how each
  obtains the handle (env accessor, DbData pull, provider fan-out, struct
  capture, deferred closure, plain parameter, escape hatch) and which methods it
  exercises; a weak answer forces the agent to re-grep a type token that occurs
  in 81 files and re-read the codebase before it can act safely.

steps:
  - name: Orient in the codebase
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer hand the agent a usable map: that this is Dolt (a
          version-controlled SQL database), that the code splits into the CLI
          (go/cmd/dolt), the core libraries (go/libraries/doltcore: env, sqle,
          merge, rebase, ...) and the storage layer (go/store), and that the
          versioned-database handle is DoltDB in
          go/libraries/doltcore/doltdb/doltdb.go, wrapping the noms/chunk
          storage?
      specificity:
        weight: 0.25
        question: |
          Are the cited paths concrete (go/libraries/doltcore/doltdb/doltdb.go)
          rather than vague ("the core layer"), and tied to actual package
          names?
      justification:
        weight: 0.20
        question: |
          Does the answer explain WHY DoltDB is central (every subsystem holds
          one to reach refs, roots, commits and working sets), not just name it?
      uncertainty:
        weight: 0.15
        question: |
          Where unsure, does it flag that so the agent doesn't act blindly?

  - name: Map the handle contract and how handles are created
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer map the DoltDB contract: the state it wraps
          (hooksDatabase/ValueReadWriter/NodeStore/commit cache), the creation
          paths (LoadDoltDB, LoadDoltDBWithParams, DoltDBFromCS), and the
          ExposeDatabaseFromDoltDB escape hatch that bypasses the handle into
          raw storage — the side door a single-ownership rework must reckon
          with?
      specificity:
        weight: 0.25
        question: |
          Are the type, each constructor/loader and the escape hatch pinned to
          file:line in doltdb.go rather than described vaguely?
      justification:
        weight: 0.20
        question: |
          Does it explain what about the contract matters for an
          obtain-and-own change (lazy loading, handle caching, hook
          registration), not just list members?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag any part of the contract it is unsure about?

  - name: Audit every holder of the handle
    criteria:
      map_quality:
        weight: 0.40
        question: |
          THE HEADLINE STEP. Does the answer assemble the COMPLETE holder set
          outside package doltdb, across every layer: the env plumbing and
          action helpers, rebase, the SQL engine (auto-GC, binlog replication,
          cluster replication controller + commithook, session auto-increment
          state, the dolt_commits / dolt_commit_ancestors system tables) AND
          the CLI corner (admin setref/conjoin/newgen-to-oldgen, schema
          copy-tags/import, branch listing, filter-branch, the dolt.go
          entrypoint), each with file:line? Completeness across BOTH the
          server-side and CLI-side holders is the whole point; a list that only
          names the files where the type token appears misses the holders that
          never name the type.
      specificity:
        weight: 0.25
        question: |
          Is each holder pinned to a concrete file:line and the actual function
          or field name, rather than a vague "various commands use the
          database"?
      justification:
        weight: 0.20
        question: |
          For each holder, does the answer state it actually holds/obtains a
          handle at that site (not merely that the file mentions the database)?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag where it may be incomplete (e.g. acquisition paths it
          could not confirm) rather than implying false completeness?

  - name: Classify how each holder obtains the handle
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Are the holders grouped by real acquisition style — lazy env accessor
          (dEnv.DoltDB(ctx)), DbData().Ddb struct pull, session/provider
          fan-out (Provider().BaseDatabase().DoltDatabases()), construction-time
          struct capture (srcDB/destDB fields), deferred closure (destDBF,
          closure factories), plain *DoltDB parameter, and the
          ExposeDatabaseFromDoltDB escape hatch — with each style's members and
          file:line, and does it say which styles single ownership kills?
      specificity:
        weight: 0.25
        question: |
          Is each classification backed by the actual acquisition line (quoted
          or precisely described), not asserted from the file name?
      justification:
        weight: 0.20
        question: |
          Does the grouping reflect the real acquisition mechanics rather than
          a superficial sort by directory?
      uncertainty:
        weight: 0.15
        question: |
          Does it note any holder whose acquisition path it was unsure about?

  - name: Assess the blast radius of the ownership change
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer reason about impact per holder: which DoltDB methods
          it exercises (SetHead, GetHeadRefs, GetBranches, PrependCommitHooks,
          NomsRoot, CSMetricsSummary, CommitItrForAllBranches, ...) and what
          behavior that backs (cluster replication, auto-GC, binlog seeding,
          session auto-increment, system tables, admin surgery, metrics),
          ranked by risk?
      specificity:
        weight: 0.25
        question: |
          Is the impact tied to concrete call sites at file:line with the
          actual method names, rather than generic risk talk?
      justification:
        weight: 0.20
        question: |
          Does it justify the risk ranking (e.g. a stalled replication
          commithook or a mis-seeded auto-increment is higher risk than a
          missing metrics summary)?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag impacts it could not fully determine?

  - name: Surface the non-obvious holders
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer single out the holders a text search would miss: the
          auto-increment tracker that never names the type (provider fan-out
          into a shadowed lowercase loop), the closure-deferred handles in the
          cluster controller/commithook, the 2-hop system tables that reach the
          handle through a commit iterator, and the CLI corner files that only
          ever call an accessor?
      specificity:
        weight: 0.25
        question: |
          Are these pinned to file:line and the exact function/field, not just
          gestured at?
      justification:
        weight: 0.20
        question: |
          Does it explain WHY each is easy to overlook (no type token, chained
          acquisition, deferred capture, drowned in accessor noise)?
      uncertainty:
        weight: 0.15
        question: |
          Does it acknowledge there may be further hidden holders?

  - name: Produce the change + verification map
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Is the final handoff a single, actionable audit map: every holder
          grouped by layer, with file:line, its acquisition style, the methods
          it exercises, and what to check when ownership becomes single and
          managed, so a teammate could land the PR without re-exploring?
      specificity:
        weight: 0.25
        question: |
          Is every entry concrete (file:line + function/field + acquisition
          style) rather than a summary?
      justification:
        weight: 0.20
        question: |
          Does each entry say what must be verified for that holder, not just
          name it?
      uncertainty:
        weight: 0.15
        question: |
          Does the map mark anything still open for the implementer to confirm?
