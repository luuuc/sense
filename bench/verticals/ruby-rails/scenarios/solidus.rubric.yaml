# Per-scenario rubric for the LLM judge layer.
#
# Audience block is shared across all steps. This rubric OPTS INTO the fifth
# `relationship` criterion (judge_prompt.v2.md); weights per step sum to 1.0:
# map_quality 0.35 / specificity 0.20 / justification 0.15 / uncertainty 0.10 /
# relationship 0.20. Mirrors the chatwoot/forem/discourse win shape.
#
# Step names MUST match scenarios/solidus.yaml exactly (the judge pairs by name).

audience: |
  An AI coding agent that will use this answer to safely rework Solidus's
  Spree::Order model contract with only small, targeted follow-up lookups, not a
  fresh exploration of the multi-gem codebase. Score for that audience, not a human
  reader. A perfect answer leaves the agent able to change the Order contract
  knowing every dependent that must be reviewed AND how each one is connected; a
  weak answer forces the agent to re-grep a token that appears across several gems.

steps:
  - name: Orient in the codebase
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer hand the agent a usable map: that this is Solidus (a
          multi-gem e-commerce platform: core, api, backend, admin, promotions), and
          specifically where the Spree::Order model sits, the cart/purchase that line
          items, payments, shipments, adjustments and promotions attach to? Could the
          agent start with only small, targeted lookups?
      specificity:
        weight: 0.20
        question: |
          Are the cited paths concrete (core/app/models/spree/order.rb, the gem
          layout) rather than vague ("the model layer")?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY the architecture is shaped this way (Order is
          the hub the purchase flow revolves around; functionality split into gems),
          not just NAME pieces?
      uncertainty:
        weight: 0.10
        question: |
          Where unsure how the gems/layers connect, does it flag that?
      relationship:
        weight: 0.20
        question: |
          Does the orientation state the CONNECTING RELATIONSHIPS, that line items/
          payments/shipments/adjustments hang off an order through associations, that
          promotions act on it, that behavior is split across gems and concerns,
          rather than only listing where things live?

  - name: Map the Order contract and what it is built on
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer map the Order model's contract with file:line: the concerns
          it includes (payments, money display), the associations records hang off it
          through, and what a change must preserve?
      specificity:
        weight: 0.20
        question: |
          Are the contract pieces named concretely by file (the Order::Payments
          concern, Spree::DisplayMoney) rather than "the concerns and associations"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY the contract is shaped this way, not just LIST
          the pieces?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag any part of the contract it could not confirm?
      relationship:
        weight: 0.20
        question: |
          For each contract piece, does the answer state the RELATION by which it binds
          to Order, not merely name the file?

  - name: Trace how an order is built and recalculated
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer trace, with file:line and in order, how a cart becomes an
          order and how it is recalculated as items/payments/shipments change (the
          order updater and the recalculation fan-out into totals, adjustments,
          shipments, stock)?
      specificity:
        weight: 0.20
        question: |
          Are the pieces named exactly (the order updater, the recalculation steps)
          with file:line?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY recalculation is centralized the way it is?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag where a recalculation step is not fully opened?
      relationship:
        weight: 0.20
        question: |
          Does the answer assemble recalculation as an explicit CHAIN, change ->
          updater -> totals/adjustments/shipments/stock, rather than a set of files?

  - name: Audit every dependent of the Order contract
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer enumerate the FULL scattered dependent set of the Order
          model, grouped by area and gem: core domain models (payment pushing state
          back, shipment refreshing rates, inventory units, exchanges, the
          adjustment-source editing incomplete orders), stock and inventory (the stock
          coordinator building packages), promotions and adjustments across the legacy
          and new promotions gems (promotion order queries, a promotion rule's
          applicability test, benefit guards), and the checkout/returns/cancellation/
          admin surface across the api/backend/admin gems? This fan-out is the heart of
          the ticket, the dependents are scattered across several gems and many dirs,
          several reach Order in non-obvious ways (a concern, an association, deriving
          something from an order), and the bare token recurs across the whole app, so
          a text search both misses some and drowns the rest. A strong answer names
          that breadth with file:line.
      specificity:
        weight: 0.20
        question: |
          Are the dependents named concretely by file and symbol
          (core/app/models/spree/exchange.rb, stock/simple_coordinator.rb,
          legacy_promotions/.../promotion.rb) with file:line and one phrase on how each
          uses the order, rather than "various controllers"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY each dependent is affected, grouping by area/gem
          rather than just LISTING files?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer acknowledge what a static pass can miss (dependents in other
          gems, reached through a concern/association or deriving from an order)?
      relationship:
        weight: 0.20
        question: |
          For each dependent, does the answer state HOW it reaches Order, the
          concern/association or the derive route, ESPECIALLY for the non-obvious
          adjustment-source / exchange / stock-coordinator / promotion-eligibility
          dependents a text search can name but not connect? A correct file list with
          no connecting relationship per dependent scores low.

  - name: Trace how order state and completeness are guarded
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer give file:line for how services/models confirm an order is
          in the right state (in progress vs complete) before mutating it (the state
          machine / completed-order guards in payments, shipments, stock, promotions)?
      specificity:
        weight: 0.20
        question: |
          Are the guards named exactly with file:line?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY mutating a completed order is dangerous?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag where a guard is missing or implicit?
      relationship:
        weight: 0.20
        question: |
          Does the answer state the path by which each guard protects a dependent,
          rather than naming methods in isolation?

  - name: Assess the blast radius of the contract change
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer assess the full blast radius of changing the Order contract:
          which dependents are at risk across every area and gem, which are most likely
          to break, and what must be re-verified, with file:line and a risk ranking?
      specificity:
        weight: 0.20
        question: |
          Are the at-risk dependents named concretely by file with a stated reason for
          the risk level?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY a given dependent is high vs low risk?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag the dependents it is least sure about (other gems,
          indirect)?
      relationship:
        weight: 0.20
        question: |
          Does the risk assessment tie each at-risk dependent to the RELATIONSHIP that
          makes it risky, rather than a ranked file list with no connecting route?

  - name: Produce the change + verification map
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer produce a complete, actionable map: the model and shared
          pieces to edit, every dependent that must be reviewed grouped by area/gem,
          and the specs/fixtures to update or add, with file:line?
      specificity:
        weight: 0.20
        question: |
          Are the files and insertion points concrete (core/app/models/spree/order.rb,
          the specs under core/spec) rather than "edit the model and add tests"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY each file is in the map?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag the parts it is least sure about?
      relationship:
        weight: 0.20
        question: |
          Does the map connect each file to the change via its relationship, so the
          chain from the Order contract change to each edited/verified file is explicit?
