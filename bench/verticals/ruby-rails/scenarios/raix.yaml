name: Raix work session - extend the tool-calling pipeline
repo: raix
# Single-prompt session bench (run via bench/drivers/bench-sense-local.sh): all steps are
# presented in ONE prompt and worked in order, so context accumulates the way a
# real work session does. Rendered to the agent: the description + each step's
# name and prompt ONLY (checks/gold are NOT shown). Everything rendered is kept
# NEUTRAL, it states the task, never the answer's shape, file paths, class or
# method names, counts, or which tool to reach for. Raix is a TINY mixin gem (177
# symbols), so this goes DEEPER than "list the modules": it centers on the
# tool-calling round-trip that composes across mixins, ChatCompletion#chat_completion
# runs the loop, FunctionDispatch.function declares tools that function_tool_adapter
# turns into schema, results are appended to the transcript (message_adapters /
# transcript_adapter / multimodal), and external MCP tools (mcp/tool.rb + clients)
# plug into the SAME dispatch. The composition spans mixins included into a host
# class with no single call site grep can follow; ChatCompletion blast is 12. The
# headline is CUMULATIVE efficiency (tool calls, billed + context tokens, time) at
# held accuracy.
description: 'You are a maintainer about to extend how this library handles
  tool/function calling during a chat, declaring callable functions, exposing them
  to the model, dispatching the model''s calls, and feeding results back. Work
  through the tasks below one at a time; each builds on what you learned in the
  previous one. Keep every answer concrete with file:line so the next step (and a
  teammate opening the PR) can act without re-exploring the codebase.'
steps:
- name: Orient in the codebase
  prompt: "Task: orient yourself. In a few sentences plus file paths, what is this
    project, how is the code organized, and where does the machinery that runs a
    chat, lets a host object expose callable functions to the model, and feeds the
    results back live, along with the shared pieces it is built on? Hand the next
    agent a map so they can act with small, targeted lookups, not a fresh
    exploration of the codebase. No Explore agents.
    "
  checks:
  - type: word
    value: completion
    required: true
  - type: word
    value: tool
    required: false
  - type: response_richness
    value: '3'
    required: false
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_conventions
    required: false
    layer: adoption
- name: Trace a tool-call round-trip through the chat loop
  prompt: "Task: trace one full round-trip where the model asks to call a function.
    Start from the chat entry point and follow it through: the model returns a
    request to call functions, those are executed, their results are added to the
    conversation, and the chat continues. Give file:line for each layer and the
    order they run.
    "
  checks:
  - type: word
    value: tool
    required: true
  - type: word
    value: transcript
    required: false
    description: Reached where results are appended to the conversation
  - type: response_richness
    value: '4'
    required: true
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Map how functions are declared and exposed to the model
  prompt: "Task: a host object declares the functions it offers, and those
    declarations are turned into the schema sent to the model. Map how a function is
    declared, where the declarations are kept, and how they become the tool schema
    passed to the model, and how the set of exposed tools can be filtered. Be
    complete with file:line; a missed step is a way the new capability won't reach
    the model.
    "
  checks:
  - type: word
    value: function
    required: true
  - type: word
    value: tool
    required: true
    description: Connected the function declaration to the tool schema
  - type: response_richness
    value: '5'
    required: true
    description: Enumerated declaration, storage, and schema conversion
  - type: contains
    value: function_dispatch.rb
    required: false
  - type: no_grep
    value: no_grep
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Map how the conversation is adapted before it is sent
  prompt: "Task: before messages go to the model, the conversation is transformed
    into the shape the provider expects, including non-text content. Map the pieces
    that transform the conversation and message content and how they fit into the
    chat flow. Be complete with file:line.
    "
  checks:
  - type: word
    value: adapter
    required: true
  - type: word
    value: message
    required: false
  - type: response_richness
    value: '4'
    required: true
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Map how external tools plug into the same dispatch
  prompt: "Task: the library can also expose tools that come from an external tool
    server, and these must flow through the same calling and dispatch path as
    locally declared functions. Map where an external tool is represented, how it is
    connected to, and how it joins the same dispatch the model calls. Be complete
    with file:line.
    "
  checks:
  - type: word
    value: MCP
    required: true
  - type: word
    value: tool
    required: false
  - type: response_richness
    value: '4'
    required: true
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Find every site that depends on the tool-call contract
  prompt: "Task: you are about to change how a tool call is declared, dispatched,
    and fed back. Find every place that depends on that contract, where the chat
    loop runs it, where functions are declared and turned into schema, where the
    conversation is adapted, where external tools join, and where this is tested. Be
    complete and use file:line; a missed site means a tool-calling path silently
    breaks or goes untested.
    "
  checks:
  - type: word
    value: tool
    required: true
  - type: response_richness
    value: '5'
    required: true
    description: Reached the dispatch, the adapters, the external tools, and the specs
  - type: contains
    value: spec
    required: false
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
- name: Produce the edit map
  prompt: "Task: produce the complete edit map for extending the tool-calling
    pipeline: which files to change across each area you explored (the chat loop,
    the function declaration and schema conversion, the conversation adapters, the
    external-tool path), and which specs to update or add. Use file:line throughout,
    so a teammate could open the PR from your map alone.
    "
  checks:
  - type: response_richness
    value: '5'
    required: true
  - type: contains
    value: spec
    required: false
  - type: contains
    value: adapter
    required: false
scoring:
  weights:
    correctness: 0.70
    efficiency: 0.30
# Raix is tiny, so gold is the must-find RELATIONAL set across the mixins that
# compose the tool-calling pipeline, not a wide enumeration. The discriminator is
# that the pipeline is assembled from mixins included into a host class, the chat
# loop (chat_completion.rb), the function DSL + dispatch (function_dispatch.rb),
# the schema conversion (function_tool_adapter.rb), the transcript/message
# adapters, and the external MCP tools that join the SAME dispatch, with no single
# call site grep can follow. All targets are file-path matched so both mention and
# cited are scored. Headline is CUMULATIVE efficiency at held accuracy.
gold:
  # the chat loop + the function dispatch DSL (the heart of tool-calling)
  - {id: chat-loop,        group: core,       match: [raix/chat_completion.rb], relation: "`Raix::ChatCompletion` concern — builds a message transcript and runs the chat-completion loop against the OpenRouter/RubyLLM client"}
  - {id: function-dispatch,group: core,       match: [raix/function_dispatch.rb], relation: "`Raix::FunctionDispatch` concern — declarative `function` definitions for ChatCompletion classes; dispatches the model's tool calls to those functions"}
  # declaration -> schema + structured output
  - {id: tool-adapter,     group: tools,      match: [raix/function_tool_adapter.rb], relation: "`Raix::FunctionToolAdapter` converts Raix function declarations into `RubyLLM::Tool` instances"}
  - {id: response-format,  group: tools,      match: [raix/response_format.rb], relation: "`Raix::ResponseFormat` converts input into a JSON schema used to structure and validate AI responses"}
  # conversation/message adapters applied before sending
  - {id: message-adapter,  group: transcript, match: [message_adapters/base.rb], relation: "`Raix::MessageAdapters::Base#transform` transforms a transcript message into the format expected by the OpenAI API"}
  - {id: transcript-adapter,group: transcript,match: [raix/transcript_adapter.rb], relation: "`Raix::TranscriptAdapter` converts between Raix's transcript-array format and RubyLLM `Message` objects"}
  - {id: multimodal,       group: transcript, match: [raix/multimodal_content_adapter.rb], relation: "`Raix::MultimodalContentAdapter` translates OpenAI-style multimodal content arrays (text + image_url) into a `RubyLLM::Content`"}
  # external MCP tools joining the same dispatch
  - {id: mcp-entry,        group: mcp,        match: [raix/mcp.rb], relation: "`Raix::MCP` concern — the `mcp <url>` DSL that fetches a remote MCP server's tool list and exposes each remote tool as an inline function"}
  - {id: mcp-tool,         group: mcp,        match: [raix/mcp/tool.rb], relation: "`Raix::MCP::Tool` represents an MCP tool with its metadata and schema"}
  - {id: mcp-sse,          group: mcp,        match: [raix/mcp/sse_client.rb], relation: "`Raix::MCP::SseClient` communicates with an MCP server over Server-Sent Events (JSON-RPC 2.0)"}
  - {id: mcp-stdio,        group: mcp,        match: [raix/mcp/stdio_client.rb], relation: "`Raix::MCP::StdioClient` communicates with an MCP server over stdio (JSON-RPC)"}
  # prompt/declaration context the loop runs within
  - {id: prompt-decl,      group: context,    match: [raix/prompt_declarations.rb], relation: "`Raix::PromptDeclarations` concern — chains prompts and handles user responses serially (with FunctionDispatch support)"}
  - {id: completion-ctx,   group: context,    match: [raix/completion_context.rb], relation: "`Raix::CompletionContext` — context passed to before_completion hooks; exposes the chat_completion instance, mutable messages (PII redaction/filtering), and params"}
  # test matrix
  - {id: spec:chat,        group: specs,      match: [chat_completion_spec.rb], relation: "ChatCompletion spec — the chat-completion loop"}
  - {id: spec:dispatch,    group: specs,      match: [function_dispatch_spec.rb], relation: "FunctionDispatch spec — tool-call dispatch"}
