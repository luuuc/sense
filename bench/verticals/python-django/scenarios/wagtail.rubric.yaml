# Per-scenario rubric for the LLM judge layer.
#
# Audience block is shared across all steps. Per-step rubrics use the same four
# criteria (map_quality, specificity, justification, uncertainty) with the
# canonical 40/25/20/15 weights. The objective headline is cited_recall on the
# `dependents` group (scored from gold, not the judge); this rubric scores the
# orthogonal answer-quality axes for the AI-agent audience.
#
# Step names MUST match scenarios/wagtail.yaml exactly (the judge pairs by name).

audience: |
  An AI coding agent that will use this answer to safely restructure the contract
  of Wagtail's page model (Page, wagtail/models/pages.py — the MP_Node tree node
  every CMS surface hangs off) with only small, targeted follow-up lookups, not a
  fresh exploration of the codebase. Score for that audience, not a human reader,
  not a docs page. A perfect answer leaves the agent knowing the COMPLETE set of
  production subsystems that depend on the model's contract — not just the serve
  view and the public API, but every scattered piece of production code that
  queries pages or embeds a page reference in its own schema (the site root FK,
  search promotions, the admin dashboard panels, reports, template tags, editor
  chrome, the chooser) — and how tightly each is coupled; a weak answer forces
  the agent to triage a hundred-file import haystack by hand before it can act
  safely.

steps:
  - name: Orient in the codebase
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer hand the agent a usable map: that this is Wagtail (a
          Django CMS package), how the package splits into core models, admin,
          api, and contrib, and that the page model is Page in
          wagtail/models/pages.py (the tree node editors create, publish, and
          serve)?
      specificity:
        weight: 0.25
        question: |
          Are the cited paths concrete (wagtail/models/pages.py) rather than
          vague ("the models package"), and tied to actual package and class
          names?
      justification:
        weight: 0.20
        question: |
          Does the answer explain WHY this model is the thing being reworked (it
          is the tree node every serving/admin/API surface hangs off), not just
          name it?
      uncertainty:
        weight: 0.15
        question: |
          Where unsure, does it flag that so the agent doesn't act blindly?

  - name: Map the page model contract
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer map the contract that is changing: the tree mechanics
          (path/depth via the node tree), live/draft publishing state, the
          specific/alias mechanics, and the key relationships other code leans
          on, each with file:line?
      specificity:
        weight: 0.25
        question: |
          Are fields, methods, and managers named concretely with file:line, not
          summarized ("various tree fields")?
      justification:
        weight: 0.20
        question: |
          Does it say which pieces of the contract other code depends on most,
          so the restructuring order follows risk?
      uncertainty:
        weight: 0.15
        question: |
          Are unverified assumptions about the contract flagged?

  - name: Enumerate every production dependent of the page model
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Is the list COMPLETE across the package: not only the serve view and
          API, but the scattered production tail (the site root FK, search
          promotions, dashboard panels, reports, template tags, editor side
          panels, the listing and chooser views), one dependent per line with
          file:line?
      specificity:
        weight: 0.25
        question: |
          Is every entry a concrete file:line, flat and uncollapsed (no "the
          various admin views")?
      justification:
        weight: 0.20
        question: |
          Does the list stay on-task (production dependents of the contract, not
          tests or migrations)?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag areas it could not fully verify rather than silently
          omitting them?

  - name: Group the dependents by subsystem
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Are the dependents organized into real subsystems (serving, sites,
          admin views/UI, reports, API, contrib apps, templates) with the
          coupling kind stated per subsystem?
      specificity:
        weight: 0.25
        question: |
          Does each subsystem entry keep concrete file:line anchors?
      justification:
        weight: 0.20
        question: |
          Does the grouping show which parts of the CMS the restructuring
          actually reaches, so a teammate sees the shape of the change?
      uncertainty:
        weight: 0.15
        question: |
          Are uncertain assignments flagged?

  - name: Assess the blast radius of the contract change
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the ranking separate schema-embedding dependents (the site root
          FK, search promotions) from transient queriers, with the driving
          editor/visitor flow named for each?
      specificity:
        weight: 0.25
        question: |
          Is each risk claim tied to a concrete dependent with file:line?
      justification:
        weight: 0.20
        question: |
          Is the risk ranking argued from coupling and product impact, not
          asserted?
      uncertainty:
        weight: 0.15
        question: |
          Are judgment calls labeled as such?

  - name: Surface the non-obvious dependents
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does it surface the genuinely easy-to-overlook dependents (the lazy
          string FKs in sites.py and search_promotions that never import the
          model, the multiline-import dashboard, the template tag) and say WHY
          each evades a quick text search?
      specificity:
        weight: 0.25
        question: |
          file:line for every surfaced dependent?
      justification:
        weight: 0.20
        question: |
          Is the "why it is easy to miss" explanation faithful to how the
          reference is actually written?
      uncertainty:
        weight: 0.15
        question: |
          Does it admit where its search could still have blind spots?

  - name: Produce the change + verification map
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Is the final map complete (every dependent from earlier steps carried
          over, none dropped), grouped by subsystem, with what-to-check-per-
          dependent when the contract changes?
      specificity:
        weight: 0.25
        question: |
          file:line throughout, so the PR can land without re-exploration?
      justification:
        weight: 0.20
        question: |
          Does each verification note follow from the dependent's coupling kind?
      uncertainty:
        weight: 0.15
        question: |
          Are residual unknowns listed as explicit follow-ups rather than
          omitted?
