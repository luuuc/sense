# Per-scenario rubric for the LLM judge layer.
#
# Audience block is shared across all steps. Per-step rubrics use the same four
# criteria (map_quality, specificity, justification, uncertainty) with the
# canonical 40/25/20/15 weights. The objective headline is cited_recall on the
# `dependents` group (scored from gold, not the judge); this rubric scores the
# orthogonal answer-quality axes for the AI-agent audience.
#
# Step names MUST match scenarios/saleor.yaml exactly (the judge pairs by name).

audience: |
  An AI coding agent that will use this answer to safely rework how a SKU-level
  ProductVariant's price, stock and identity are read in Saleor with only small,
  targeted follow-up lookups, not a fresh exploration of the codebase. Score for
  that audience, not a human reader, not a docs page. A perfect answer leaves the
  agent able to change the variant contract knowing every dependent across every
  app — both the models that hold a relationship to the variant AND the scattered
  code that reads, derives, reprices or serializes one — and how each is connected;
  a weak answer forces the agent to re-grep a token that occurs thousands of times
  and re-read the codebase before it can act safely.

steps:
  - name: Orient in the codebase
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer hand the agent a usable map: that this is Saleor (a
          Django e-commerce platform), that the code is split into per-domain apps
          (product, order, checkout, warehouse, discount, attribute, ...), and that
          the central sellable entity is ProductVariant in saleor/product/models.py
          (the SKU-level unit, distinct from Product)?
      specificity:
        weight: 0.25
        question: |
          Are the cited paths concrete (saleor/product/models.py) rather than vague
          ("the catalog code"), and tied to actual app and model names?
      justification:
        weight: 0.20
        question: |
          Does the answer explain WHY ProductVariant is central (lines, inventory,
          pricing, promotions are all written against it), not just name it?
      uncertainty:
        weight: 0.15
        question: |
          Where unsure, does it flag that so the agent doesn't act blindly?

  - name: Map the variant contract and what it is built on
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer map ProductVariant's contract: the base classes/mixins it
          inherits and the records it directly owns (per-channel listings, media,
          translations), and how price/stock are read, so the agent knows what the
          model is before changing it?
      specificity:
        weight: 0.25
        question: |
          Are the model and its owned records pinned to file:line in
          saleor/product/models.py rather than described vaguely?
      justification:
        weight: 0.20
        question: |
          Does it explain what about the contract matters for a price/stock/identity
          read-path change, not just list members?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag any part of the contract it is unsure about?

  - name: Audit every dependent of the variant contract
    criteria:
      map_quality:
        weight: 0.40
        question: |
          THE HEADLINE STEP. Does the answer assemble the COMPLETE cross-domain
          dependent set: BOTH the models holding a relationship to ProductVariant
          (order, checkout, warehouse, discount, attribute) AND the scattered code
          that reads/derives/reprices/serializes a variant (order-line creation,
          checkout->order conversion, notification and tax-webhook payload builders,
          bulk import, the generic attribute-reference, promotion/voucher targeting),
          each with file:line? Completeness across BOTH kinds is the whole point; a
          list that only names the foreign-key models, or misses the behavioral
          callers, leaves a dependent that breaks on the rework.
      specificity:
        weight: 0.25
        question: |
          Is each dependent pinned to a concrete file:line and the actual model or
          function name, rather than a vague "various services use the variant"?
      justification:
        weight: 0.20
        question: |
          For each dependent, does the answer state HOW it depends (the relationship
          kind, or what it reads off a variant), not just name the file?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag where it may be incomplete (e.g. relationships it could not
          confirm) rather than implying false completeness?

  - name: Group the dependents by domain
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Are the dependents organized into coherent domains (ordering, checkout,
          inventory, pricing/promotions, attributes, tax, notifications, API layer)
          with the app each lives in, so the agent sees which parts of the system
          reworking the variant contract reaches?
      specificity:
        weight: 0.25
        question: |
          Are domains tied to concrete apps and models/functions with file:line, not
          loose labels?
      justification:
        weight: 0.20
        question: |
          Does the grouping reflect real coupling rather than a superficial sort?
      uncertainty:
        weight: 0.15
        question: |
          Does it note any dependent it was unsure how to place?

  - name: Assess the blast radius of the contract change
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer reason about impact per dependent: for model dependents
          the relationship + on-delete behavior, for code dependents what they read
          off a variant (price, channel listing, sku, media, stock), ranked by risk,
          so the agent can prioritize?
      specificity:
        weight: 0.25
        question: |
          Is the impact tied to concrete dependents at file:line with their actual
          relationship / read, rather than generic risk talk?
      justification:
        weight: 0.20
        question: |
          Does it justify the risk ranking (e.g. a mispriced order line is higher
          risk than a missing translation)?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag impacts it could not fully determine?

  - name: Surface the non-obvious dependents
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer single out the dependents a text search would miss: those
          far from the catalog code, depending on a variant through CODE rather than
          a relationship named after it, reached through a generic reference or a
          many-to-many through table, or drowned by a model name that occurs
          thousands of times (e.g. a payload builder, a tax-webhook serializer, the
          attribute reference, the promotion through table)?
      specificity:
        weight: 0.25
        question: |
          Are these pinned to file:line and the exact function/field, not just
          gestured at?
      justification:
        weight: 0.20
        question: |
          Does it explain WHY each is easy to overlook?
      uncertainty:
        weight: 0.15
        question: |
          Does it acknowledge there may be further hidden dependents?

  - name: Produce the change + verification map
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Is the final handoff a single, actionable audit map: every dependent
          grouped by domain, with file:line, its relationship to the variant
          contract, and what to check when the read path changes, so a teammate
          could land the PR without re-exploring?
      specificity:
        weight: 0.25
        question: |
          Is every entry concrete (file:line + model/function + relationship) rather
          than a summary?
      justification:
        weight: 0.20
        question: |
          Does each entry say what must be verified for that dependent, not just
          name it?
      uncertainty:
        weight: 0.15
        question: |
          Does the map mark anything still open for the implementer to confirm?
