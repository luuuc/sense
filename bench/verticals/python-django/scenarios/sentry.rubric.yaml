# Per-scenario rubric for the LLM judge layer.
#
# Audience block is shared across all steps. Per-step rubrics use the same four
# criteria (map_quality, specificity, justification, uncertainty) with the
# canonical 40/25/20/15 weights. The objective headline is cited_recall on the
# `dependents` group (scored from gold, not the judge); this rubric scores the
# orthogonal answer-quality axes for the AI-agent audience.
#
# Step names MUST match scenarios/sentry.yaml exactly (the judge pairs by name).

audience: |
  An AI coding agent that will use this answer to safely restructure the contract
  of Sentry's core issue model (Group, src/sentry/models/group.py — the
  deduplicated-issue aggregate) with only small, targeted follow-up lookups, not a
  fresh exploration of the codebase. Score for that audience, not a human reader,
  not a docs page. A perfect answer leaves the agent knowing the COMPLETE set of
  production subsystems that depend on the model's contract — not just the obvious
  API serializers and REST endpoints, but every scattered piece of production code
  that holds a Group reference inside its own data structures or passes one across
  its own boundaries (digest contexts, notification bases and strategies,
  alert-rule and workflow-engine history records, sentry-app external-issue
  builders, the eventstore event wrapper, the AI-triage models) — and how tightly
  each is coupled; a weak answer forces the agent to triage a 269-file import
  haystack by hand before it can act safely.

steps:
  - name: Orient in the codebase
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer hand the agent a usable map: that this is Sentry (a
          Django error-monitoring platform, with a React frontend), that the
          backend is split into per-subsystem packages under src/sentry, and that
          the core issue model is Group in src/sentry/models/group.py (the
          deduplicated-issue aggregate users triage, assign, and resolve)?
      specificity:
        weight: 0.25
        question: |
          Are the cited paths concrete (src/sentry/models/group.py) rather than
          vague ("the models package"), and tied to actual package and class
          names?
      justification:
        weight: 0.20
        question: |
          Does the answer explain WHY this model is the thing being reworked (it
          is the aggregate every triage/notification/workflow surface hangs off),
          not just name it?
      uncertainty:
        weight: 0.15
        question: |
          Where unsure, does it flag that so the agent doesn't act blindly?

  - name: Map the issue model contract
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer map the model's contract: its key fields (status /
          substatus lifecycle, project relationship, message/culprit metadata)
          and — crucially for this rework — how other code is expected to hold
          and pass references to a Group, so the agent knows the contract before
          restructuring it?
      specificity:
        weight: 0.25
        question: |
          Is the model pinned to file:line in src/sentry/models/group.py with its
          actual field and property names, rather than described vaguely?
      justification:
        weight: 0.20
        question: |
          Does it explain what about the contract matters for a restructuring
          (which parts other code embeds), not just list fields?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag any part of the contract it is unsure about?

  - name: Enumerate every production dependent of the issue model
    criteria:
      map_quality:
        weight: 0.40
        question: |
          THE HEADLINE STEP. Does the answer assemble the COMPLETE dependent set:
          BOTH the obvious API layer (the Group serializer, the issue REST
          endpoints, the ingestion path's GroupInfo) AND the scattered production
          code that holds a Group reference inside its own contract far from the
          model — the email-digest context (digests/utils.py), the notification
          base and the notification-platform strategy, the alert-rule fire
          history record (rules/history/base.py), the three sentry-app
          external-issue builders (external_issue_creator / issue_link_creator /
          issue_link_requester), the eventstore GroupEvent wrapper
          (services/eventstore/models.py), the AI night-shift TriageResult
          (tasks/seer/night_shift/models.py), and the workflow-engine
          WorkflowEventData and WorkflowGroupHistory — each with file:line?
          Completeness across unexpected subsystems is the whole point; a list
          that only names the API layer leaves whole subsystems breaking
          silently.
      specificity:
        weight: 0.25
        question: |
          Is each dependent pinned to a concrete file:line and the actual class
          or structure name, rather than a vague "the various serializers"?
      justification:
        weight: 0.20
        question: |
          Is the list genuinely flat and per-item (one dependent per line) rather
          than collapsed into subsystem summaries?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag where it may be incomplete (e.g. importers it could not
          triage) rather than implying false completeness?

  - name: Group the dependents by subsystem
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Are the dependents organized into coherent subsystems (API/serializers,
          ingestion, digests, notifications, alert rules, sentry-apps,
          eventstore, AI triage, workflow engine) with the package each lives in
          and HOW it depends on the model (stores a reference in its own
          structures, passes one through its API, reads specific fields), so the
          agent sees which parts of the product the restructuring reaches?
      specificity:
        weight: 0.25
        question: |
          Are subsystems tied to concrete packages and classes with file:line,
          not loose labels?
      justification:
        weight: 0.20
        question: |
          Does the grouping reflect real coupling (contract-embedding vs
          transient reads) rather than a superficial sort?
      uncertainty:
        weight: 0.15
        question: |
          Does it note any dependent it was unsure how to place?

  - name: Assess the blast radius of the contract change
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer reason about impact per dependent: what product flow
          drives it (digest emails, chat notifications, alert-rule history,
          sentry-app integrations, workflow automation, AI triage) and how
          tightly it embeds the model in its own contract, ranked by risk, so the
          agent can prioritize?
      specificity:
        weight: 0.25
        question: |
          Is the impact tied to concrete dependents at file:line with their
          actual coupling, rather than generic risk talk?
      justification:
        weight: 0.20
        question: |
          Does it justify the risk ranking (e.g. a structure every notification
          instantiates breaking is higher risk than one admin view)?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag impacts it could not fully determine?

  - name: Surface the non-obvious dependents
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer single out the dependents a text search would miss: the
          ones living far from the model in unexpected subsystems (the AI
          night-shift triage models, the sentry-app external-request builders,
          the email-digest context), the ones that import the model only under
          `if TYPE_CHECKING:` so a runtime-import sweep never sees them
          (notifications/notifications/base.py, rules/history/base.py,
          services/eventstore/models.py, workflow_engine/types.py), and the one
          whose file defines its own unrelated nested `Group` enums making a text
          search actively misleading (workflow_engine/types.py)?
      specificity:
        weight: 0.25
        question: |
          Are these pinned to file:line with the reason stated (type-only import,
          unexpected subsystem, name collision), not just gestured at?
      justification:
        weight: 0.20
        question: |
          Does it explain WHY each is easy to overlook, concretely, per
          dependent?
      uncertainty:
        weight: 0.15
        question: |
          Does it acknowledge there may be further hidden dependents it could not
          confirm?

  - name: Produce the change + verification map
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Is the final handoff a single, actionable audit map: every dependent
          grouped by subsystem, with file:line, how it depends on the issue
          model, and what to check when the contract changes, so a teammate could
          land the PR without re-exploring? Does it carry over the minor and
          unexpected-subsystem dependents from earlier steps rather than dropping
          them?
      specificity:
        weight: 0.25
        question: |
          Is every entry concrete (file:line + class/structure + coupling) rather
          than a summary?
      justification:
        weight: 0.20
        question: |
          Does each entry say what must be verified for that dependent, not just
          name it?
      uncertainty:
        weight: 0.15
        question: |
          Does the map mark anything still open for the implementer to confirm?
