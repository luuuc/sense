# Per-scenario rubric for the LLM judge layer.
#
# Audience block is shared across all steps. Per-step rubrics use the same four
# criteria (map_quality, specificity, justification, uncertainty) with the
# canonical 40/25/20/15 weights. The objective headline is cited_recall on the
# `dependents` group (scored from gold, not the judge); this rubric scores the
# orthogonal answer-quality axes for the AI-agent audience.
#
# Step names MUST match scenarios/healthchecks.yaml exactly (the judge pairs by name).

audience: |
  An AI coding agent that will use this answer to safely rework the base
  notification-delivery contract of Healthchecks (Transport, hc/api/transports.py: the
  abstract class that turns a check's state change into a delivered alert - the notify()
  entry point every concrete delivery method overrides plus the shared helpers they call)
  with only small, targeted follow-up lookups, not a fresh exploration of the codebase.
  Score for that audience, not a human reader, not a docs page. A perfect answer leaves
  the agent able to change the base contract knowing the COMPLETE set of concrete
  delivery implementations affected - each in its own per-integration package, several
  reaching the base through an intermediate class so their class line never names it, and
  several overriding a shared helper rather than the main entry point - and how each is
  connected; a weak answer forces the agent to list every integration package, read the
  base and its intermediates, and resolve the string registry before it can act safely.

steps:
  - name: Orient in the codebase
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer hand the agent a usable map: that this is Healthchecks (a
          Django cron/uptime monitoring app), that the code is split into per-feature
          apps under hc/ (api, front, accounts, integrations, ...), and that the base
          notification-delivery contract is the Transport class in hc/api/transports.py
          (the abstract class that turns a check's state change into a delivered alert)?
      specificity:
        weight: 0.25
        question: |
          Are the cited paths concrete (hc/api/transports.py) rather than vague ("the
          notifications code"), and tied to actual app and class names?
      justification:
        weight: 0.20
        question: |
          Does the answer explain WHY this base class is the thing being reworked (it is
          the shared contract every concrete delivery method implements), not just name
          it?
      uncertainty:
        weight: 0.15
        question: |
          Where unsure, does it flag that so the agent doesn't act blindly?

  - name: Map the base transport contract and what it is built on
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer map the base contract: the entry point every implementation
          must override (notify(flip, notification)), the shared helpers the base
          provides that implementations call (down_checks / last_ping / get_ping_body /
          tmpl / is_noop), and what a teammate needs to know before changing it?
      specificity:
        weight: 0.25
        question: |
          Are the base class, its entry point, and its helpers pinned to file:line in
          hc/api/transports.py rather than described vaguely?
      justification:
        weight: 0.20
        question: |
          Does it explain what about the contract matters for the change (which parts
          implementations depend on), not just list members?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag any part of the contract it is unsure about?

  - name: Enumerate every concrete delivery method built on the base contract
    criteria:
      map_quality:
        weight: 0.40
        question: |
          THE HEADLINE STEP. Does the answer assemble the COMPLETE implementation set:
          every concrete delivery method that builds on the base, each in its own
          per-integration package (email, chat services, SMS/voice, push, webhook, and
          the rest), INCLUDING the ones that reach the base through an intermediate class
          (Slackalike -> HttpTransport) and the ones that override a shared helper rather
          than the entry point, each with file:line? Completeness across every
          integration package is the whole point; a list that names only the obvious
          direct subclasses leaves delivery methods that silently break against the new
          base contract.
      specificity:
        weight: 0.25
        question: |
          Is each implementation pinned to a concrete file:line and the actual class
          name, rather than a vague "the various channel classes"?
      justification:
        weight: 0.20
        question: |
          For each implementation, does the answer indicate HOW it depends on the base
          (which method it overrides / whether via an intermediate), not just name the
          file?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag where it may be incomplete (e.g. integration packages it could not
          confirm) rather than implying false completeness?

  - name: Group the implementations by how they reach the base
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Are the implementations organized by how they connect to the base (direct
          subclasses of Transport, subclasses reached through the HttpTransport /
          Slackalike intermediates, and whether each overrides the entry point or a shared
          helper), with the package each lives in, so the agent sees which parts of the
          notification code the change reaches?
      specificity:
        weight: 0.25
        question: |
          Are the groups tied to concrete packages and classes with file:line, not loose
          labels?
      justification:
        weight: 0.20
        question: |
          Does the grouping reflect real inheritance/override coupling rather than a
          superficial sort?
      uncertainty:
        weight: 0.15
        question: |
          Does it note any implementation it was unsure how to place?

  - name: Assess the blast radius of the contract change
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer reason about impact per implementation: what it delivers and
          how it depends on the base (which method it overrides, which helpers it calls,
          whether via an intermediate), ranked by risk, so the agent can prioritize?
      specificity:
        weight: 0.25
        question: |
          Is the impact tied to concrete implementations at file:line with their actual
          dependence on the base, rather than generic risk talk?
      justification:
        weight: 0.20
        question: |
          Does it justify the risk ranking (e.g. an implementation overriding a helper
          the base signature change touches is higher risk than a plain notify()
          override)?
      uncertainty:
        weight: 0.15
        question: |
          Does it flag impacts it could not fully determine?

  - name: Surface the non-obvious implementations
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Does the answer single out the implementations a text search would miss: the
          ones whose class line never contains the base's name because they reach it
          through an intermediate (Discord / Mattermost / Slack via Slackalike), the ones
          that override a shared helper rather than the entry point (payload / prepare /
          is_noop), and the ones reached only through the string registry mapping a
          channel kind to its class?
      specificity:
        weight: 0.25
        question: |
          Are these pinned to file:line and the intermediate or helper involved, not just
          gestured at?
      justification:
        weight: 0.20
        question: |
          Does it explain WHY each is easy to overlook (the intermediate class, the helper
          override, the string registry indirection)?
      uncertainty:
        weight: 0.15
        question: |
          Does it acknowledge there may be further implementations it did not surface?

  - name: Produce the change + verification map
    criteria:
      map_quality:
        weight: 0.40
        question: |
          Is the final handoff a single, actionable audit map: every concrete delivery
          implementation grouped by how it reaches the base, with file:line, which method
          it overrides or which helper it relies on, and what to check when the base
          contract changes, so a teammate could land the PR without re-exploring?
      specificity:
        weight: 0.25
        question: |
          Is every entry concrete (file:line + class + override/intermediate) rather than
          a summary?
      justification:
        weight: 0.20
        question: |
          Does each entry say what must be verified for that implementation, not just name
          it?
      uncertainty:
        weight: 0.15
        question: |
          Does the map mark anything still open for the implementer to confirm?
