# Per-scenario rubric for the LLM judge layer.
#
# Audience block is shared across all steps. This rubric OPTS INTO the fifth
# `relationship` criterion (judge_prompt.v2.md); weights per step sum to 1.0:
# map_quality 0.35 / specificity 0.20 / justification 0.15 / uncertainty 0.10 /
# relationship 0.20. Mirrors the chatwoot/forem/discourse win shape.
#
# Step names MUST match scenarios/lobsters.yaml exactly (the judge pairs by name).

audience: |
  An AI coding agent that will use this answer to safely rework Lobsters' Story
  model contract with only small, targeted follow-up lookups, not a fresh
  exploration of the codebase. Score for that audience, not a human reader. A
  perfect answer leaves the agent able to change the Story contract knowing every
  dependent that must be reviewed AND how each one is connected; a weak answer
  forces the agent to re-grep a recurring token and re-read the codebase first.

steps:
  - name: Orient in the codebase
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer hand the agent a usable map: that this is Lobsters (a
          link-aggregator/forum), how the Rails app is organized (app/models,
          app/controllers, app/helpers, app/mailboxes, lib/extras), and specifically
          where the Story model sits, the submission users comment/vote/tag/flag on?
          Could the agent start with only small, targeted lookups?
      specificity:
        weight: 0.20
        question: |
          Are the cited paths concrete (app/models/story.rb, app/models/vote.rb)
          rather than vague ("the model layer")?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY the architecture is shaped this way (Story is
          the central submission other records hang off), not just NAME the pieces?
      uncertainty:
        weight: 0.10
        question: |
          Where unsure how the layers connect, does it flag that so the agent doesn't
          act blindly?
      relationship:
        weight: 0.20
        question: |
          Does the orientation state the CONNECTING RELATIONSHIPS, that comments/
          votes/tags hang off a story through associations, that shared behavior is
          pulled in through a concern, rather than only listing where things live?

  - name: Map the Story contract and what it is built on
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer map the Story model's contract with file:line: the concern
          it includes, the associations records hang off it through (comments, votes,
          taggings), and what a change must preserve?
      specificity:
        weight: 0.20
        question: |
          Are the contract pieces named concretely by file (the Token concern,
          app/models/story.rb) rather than "the concerns and associations"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY the contract is shaped this way, not just LIST
          the pieces?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag any part of the contract it could not confirm?
      relationship:
        weight: 0.20
        question: |
          For each contract piece, does the answer state the RELATION by which it
          binds to Story (which concern supplies what, which associations hang off),
          not merely name the file?

  - name: Trace how a story is created and ranked
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer trace, with file:line and in order, how a submission becomes
          a stored Story (the controller create path), through URL handling, markdown
          rendering, and the ranking/score machinery? Could the agent follow the same
          path to change it safely?
      specificity:
        weight: 0.20
        question: |
          Are the pieces named exactly (the stories controller create, the URL/link
          handling, the markdowner, the score/hotness calc) with file:line?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY the score/ranking is computed the way it is, not
          just LIST the chain?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag where a step is not fully opened, so the agent
          verifies?
      relationship:
        weight: 0.20
        question: |
          Does the answer assemble creation as an explicit CHAIN, submission ->
          controller -> URL/markdown -> score, rather than a set of files?

  - name: Audit every dependent of the Story contract
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer enumerate the FULL scattered dependent set of the Story
          model, grouped by area: content and rendering (comments, the link URL
          handler, the markdown re-renderer), search (the search indexer), statistics
          (the stats/graph cache), voting and flagging (the polymorphic vote target,
          the flag-permission check), inbound email (the mailbox that resolves a
          reply's parent story), and moderation (the flagged-stories and mod-mail
          controllers)? This fan-out is the heart of the ticket, the dependents are
          scattered across models/helpers/mailboxes/lib and several reach Story in
          non-obvious ways (a concern, an association, deriving something from a
          story), and the bare token recurs across the app, so a text search both
          misses some and drowns the rest. A strong answer names that breadth with
          file:line.
      specificity:
        weight: 0.20
        question: |
          Are the dependents named concretely by file and symbol (app/models/search.rb,
          app/mailboxes/inbox_mailbox.rb, extras/markdowner.rb) with file:line and one
          phrase on how each uses the story, rather than "various models"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY each dependent is affected, grouping by area
          rather than just LISTING files?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer acknowledge what a static pass can miss (dependents reached
          only through a concern/association or that derive something from a story)?
      relationship:
        weight: 0.20
        question: |
          For each dependent, does the answer state HOW it reaches Story, the
          association/concern, or the derive route, ESPECIALLY for the non-obvious
          search/stats/mailbox/markdowner dependents a text search can name but not
          connect? A correct file list with no connecting relationship per dependent
          scores low.

  - name: Trace how story identity and visibility are guarded
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer give file:line for how work confirms it is operating on a
          real, current, visible story before acting (presence/visibility checks in
          the search, stats, inbound-email and moderation paths)?
      specificity:
        weight: 0.20
        question: |
          Are the guards named exactly with file:line, rather than "the validation
          code"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY work must re-confirm the story (it may be
          deleted/hidden), not just NAME the pieces?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag where a guard is missing or implicit?
      relationship:
        weight: 0.20
        question: |
          Does the answer state the path by which each guard protects a dependent,
          rather than naming methods in isolation?

  - name: Assess the blast radius of the contract change
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer assess the full blast radius of changing the Story contract:
          which dependents are at risk across every area (rendering, search, stats,
          voting/flagging, email, moderation), which are most likely to break, and
          what must be re-verified, with file:line and a risk ranking?
      specificity:
        weight: 0.20
        question: |
          Are the at-risk dependents named concretely by file with a stated reason for
          the risk level?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY a given dependent is high vs low risk?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag the dependents it is least sure about (indirect,
          concern- or derive-reached)?
      relationship:
        weight: 0.20
        question: |
          Does the risk assessment tie each at-risk dependent to the RELATIONSHIP that
          makes it risky, rather than a ranked file list with no connecting route?

  - name: Produce the change + verification map
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer produce a complete, actionable map: the model and shared
          pieces to edit (story.rb, the concern), every dependent that must be reviewed
          grouped by area, and the specs/fixtures to update or add, with file:line?
      specificity:
        weight: 0.20
        question: |
          Are the files and insertion points concrete (app/models/story.rb, the specs
          under spec/models) rather than "edit the model and add tests"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY each file is in the map?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag the parts it is least sure about?
      relationship:
        weight: 0.20
        question: |
          Does the map connect each file to the change via its relationship, so the
          chain from the Story contract change to each edited/verified file is explicit?
