name: Solidus work session - add support for a new promotion type
repo: solidus
# Single-prompt session bench (run via bench/bench-sense-local.sh): all steps are
# presented in ONE prompt and worked in order, so context accumulates the way a
# real work session does. Rendered to the agent: the description + each step's
# name and prompt ONLY (checks/gold are NOT shown). Everything rendered is kept
# NEUTRAL, it states the task, never the answer's shape, file paths, class or
# method names, counts, or which tool to reach for. The recurring real task this
# mirrors is "add a new promotion type" in the current SolidusPromotions system:
# a new Condition (when the promo applies) + a new Benefit (what discount it
# gives) wired to a Calculator (how much), registered in the central
# configuration and applied by the OrderAdjuster engine. This naturally walks the
# application engine, the Condition base + its ~25 subclasses, the Benefit base +
# its subclasses, the promotion calculators, the configuration registry, and the
# spec matrix. The headline is CUMULATIVE efficiency (tool calls, billed + context
# tokens, time) at held accuracy: across these areas the baseline re-derives the
# structure each step while the map is queried once and reused.
description: 'You are a maintainer about to add support for a new kind of
  promotional discount to this store, mirroring how the existing promotions are
  built. Work through the tasks below one at a time; each builds on what you
  learned in the previous one. Keep every answer concrete with file:line so the
  next step (and a teammate opening the PR) can act without re-exploring the
  codebase.'
steps:
- name: Orient in the codebase
  prompt: "Task: orient yourself. In a few sentences plus file paths, what is this
    project, how is the code organized, and where does the machinery that decides
    when a promotional discount applies, what discount it gives, and how much it is
    worth live, along with the shared pieces it is built on? Hand the next agent a
    map so they can act with small, targeted lookups, not a fresh exploration of
    the codebase. No Explore agents.
    "
  checks:
  - type: word
    value: Promotion
    required: true
  - type: word
    value: discount
    required: false
    description: Named the discount machinery, not just the promotion record
  - type: response_richness
    value: '3'
    required: false
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_conventions
    required: false
    layer: adoption
- name: Trace how a promotion is applied to an order
  prompt: "Task: trace how an active promotion ends up changing an order's totals.
    Start from where an order is recalculated and follow it down through to where
    the applicability rules are checked and the discount amounts are turned into
    adjustments on the order. Give file:line for each layer and the order they run.
    "
  checks:
  - type: word
    value: OrderAdjuster
    required: true
    description: Found the engine that evaluates and applies promotions
  - type: word
    value: adjustment
    required: false
  - type: response_richness
    value: '4'
    required: true
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Map the applicability-rule family and its contract
  prompt: "Task: a new promotion needs a rule for when it applies. Map the shared
    base that the existing when-it-applies rules are built on, the contract such a
    rule must implement, and which existing rules customize that behavior and how
    each one differs. Be complete with file:line; a missed rule is a pattern the
    new promotion can't reuse.
    "
  checks:
  - type: word
    value: Condition
    required: true
  - type: word
    value: eligible
    required: true
    description: Anchored on the applicability contract every rule implements
  - type: response_richness
    value: '6'
    required: true
    description: Enumerated the shared base plus the per-rule customizations
  - type: contains
    value: condition.rb
    required: false
  - type: no_grep
    value: no_grep
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Map the discount-action family and its amount calculators
  prompt: "Task: a new promotion also needs an action that produces the discount,
    and that action computes its amount with a pluggable calculator. Map the shared
    base the existing discount actions are built on and which actions customize it,
    and the calculators an action can use to compute how much. Be complete with
    file:line.
    "
  checks:
  - type: word
    value: Benefit
    required: true
  - type: word
    value: Calculator
    required: true
    description: Reached the pluggable amount calculators, not just the action
  - type: response_richness
    value: '6'
    required: true
    description: Enumerated the action base, its subclasses, and the calculators
  - type: contains
    value: benefit.rb
    required: false
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Map where the rules, actions, and calculators are registered
  prompt: "Task: the available rules, actions, and the calculators each action may
    use are declared in one place so the system and the admin know the full set.
    Map where that declaration lives, what it lists, and how an action is tied to
    the calculators it allows. Be complete with file:line.
    "
  checks:
  - type: word
    value: Configuration
    required: true
  - type: word
    value: calculators
    required: false
    description: Found the action-to-calculator mapping
  - type: response_richness
    value: '4'
    required: true
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
- name: Find every site that must change to add a new promotion type
  prompt: "Task: you will add the new promotion. Find every place in the codebase
    that must change for its applicability rule, its discount action, and its
    amount calculator to exist, be registered, be applied to orders, and be tested,
    including where the shared bases are depended on. Be complete and use file:line;
    a missed site means the new promotion silently never applies or is untested.
    "
  checks:
  - type: word
    value: Condition
    required: true
  - type: word
    value: Benefit
    required: true
  - type: response_richness
    value: '6'
    required: true
    description: Reached the registry and the spec matrix, not just one new file
  - type: contains
    value: spec
    required: false
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
- name: Produce the edit map
  prompt: "Task: produce the complete edit map for adding the new promotion: which
    files to create and which to change across each area you explored (the
    applicability rule, the discount action, the amount calculator, the registry
    that declares them, the engine that applies them), and which specs and fixtures
    to add. Use file:line throughout, so a teammate could open the PR from your map
    alone.
    "
  checks:
  - type: response_richness
    value: '6'
    required: true
  - type: contains
    value: spec
    required: false
  - type: contains
    value: calculator
    required: false
scoring:
  weights:
    correctness: 0.70
    efficiency: 0.30
# Gold spans the areas the "add a promotion type" session walks. The discriminator
# is the twin fan-out: the `conditions` group (applicability rules subclassing
# SolidusPromotions::Condition, blast 15) and the `benefits` group (discount
# actions subclassing SolidusPromotions::Benefit, blast 10), plus the
# `calculators` an action plugs in. These inheritance fan-outs are grep-invisible
# (the subclass relationship is structural, and the engine reaches each via
# polymorphic eligible?/discount dispatch, not a literal string). The `registry`
# (configuration.rb add_class_set + the action->calculator nested map) and the
# `engine` (OrderAdjuster) are the grep-hard seams. All targets are file-path
# matched so both mention (is it on the map?) and cited (pinned to path:line?) are
# scored. The session headline is CUMULATIVE efficiency at held accuracy.
gold:
  # engine, how an active promotion changes an order's totals
  - {id: order-adjuster,    group: engine,     match: [models/solidus_promotions/order_adjuster.rb]}
  - {id: discount-order,    group: engine,     match: [order_adjuster/discount_order.rb]}
  - {id: promotion-model,   group: engine,     match: [models/solidus_promotions/promotion.rb]}
  # shared bases + the registry that declares the available set
  - {id: condition-base,    group: registry,   match: [models/solidus_promotions/condition.rb]}
  - {id: benefit-base,      group: registry,   match: [models/solidus_promotions/benefit.rb]}
  - {id: configuration,     group: registry,   match: [lib/solidus_promotions/configuration.rb]}
  # applicability rules (subclasses of Condition, grep-invisible inheritance fan-out)
  - {id: cond:item-total,   group: conditions, match: [models/solidus_promotions/conditions/item_total.rb]}
  - {id: cond:product,      group: conditions, match: [models/solidus_promotions/conditions/product.rb]}
  - {id: cond:taxon,        group: conditions, match: [models/solidus_promotions/conditions/taxon.rb]}
  - {id: cond:user,         group: conditions, match: [models/solidus_promotions/conditions/user.rb]}
  - {id: cond:first-order,  group: conditions, match: [models/solidus_promotions/conditions/first_order.rb]}
  - {id: cond:nth-order,    group: conditions, match: [models/solidus_promotions/conditions/nth_order.rb]}
  - {id: cond:option-value, group: conditions, match: [models/solidus_promotions/conditions/option_value.rb]}
  - {id: cond:store,        group: conditions, match: [models/solidus_promotions/conditions/store.rb]}
  - {id: cond:shipping,     group: conditions, match: [models/solidus_promotions/conditions/shipping_method.rb]}
  - {id: cond:min-quantity, group: conditions, match: [models/solidus_promotions/conditions/minimum_quantity.rb]}
  - {id: cond:li-product,   group: conditions, match: [models/solidus_promotions/conditions/line_item_product.rb]}
  - {id: cond:li-taxon,     group: conditions, match: [models/solidus_promotions/conditions/line_item_taxon.rb]}
  - {id: cond:user-role,    group: conditions, match: [models/solidus_promotions/conditions/user_role.rb]}
  - {id: cond:one-per-user, group: conditions, match: [models/solidus_promotions/conditions/one_use_per_user.rb]}
  # discount actions (subclasses of Benefit)
  - {id: ben:adjust-li,     group: benefits,   match: [models/solidus_promotions/benefits/adjust_line_item.rb]}
  - {id: ben:adjust-ship,   group: benefits,   match: [models/solidus_promotions/benefits/adjust_shipment.rb]}
  - {id: ben:adjust-li-qty, group: benefits,   match: [models/solidus_promotions/benefits/adjust_line_item_quantity_groups.rb]}
  - {id: ben:advertise,     group: benefits,   match: [models/solidus_promotions/benefits/advertise_price.rb]}
  - {id: ben:create-disc,   group: benefits,   match: [models/solidus_promotions/benefits/create_discounted_item.rb]}
  # amount calculators an action plugs in
  - {id: calc:percent,      group: calculators,match: [solidus_promotions/calculators/percent.rb]}
  - {id: calc:distributed,  group: calculators,match: [solidus_promotions/calculators/distributed_amount.rb]}
  - {id: calc:tiered-flat,  group: calculators,match: [solidus_promotions/calculators/tiered_flat_rate.rb]}
  - {id: calc:tiered-pct,   group: calculators,match: [solidus_promotions/calculators/tiered_percent.rb]}
  # test matrix, the engine spec + per-rule / per-action specs
  - {id: spec:order-adjuster,group: specs,     match: [solidus_promotions/order_adjuster_spec.rb]}
  - {id: spec:cond-item-total,group: specs,    match: [conditions/item_total_spec.rb]}
  - {id: spec:ben-adjust-li, group: specs,     match: [benefits/adjust_line_item_spec.rb]}
