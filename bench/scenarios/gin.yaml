name: Gin middleware chain tracing and recovery modification assessment
repo: gin
description: 'Trace the Gin HTTP request dispatch from Engine.ServeHTTP through

  the radix tree router to handler execution. Understand the middleware

  chain (Context.Next, Context.Abort) and then assess modifying the

  recovery middleware to add request ID injection. Tests structural

  tracing of Go HTTP frameworks, middleware flow comprehension, and

  safe modification planning.

  '
steps:
- name: Trace HTTP dispatch from entry point
  prompt: 'You''re about to insert a request-ID hook into gin''s dispatch chain. Hand
    the next agent the full HTTP request pipeline starting from Engine.ServeHTTP:
    every method with file:line, the struct/type it belongs to, what it does, and
    what it calls next. Cover the intermediates (updateRouteTrees, serveError, redirect
    handlers). The follow-up agent should need only small, targeted lookups — not
    a fresh exploration of the package. '
  checks:
  - type: contains
    value: ServeHTTP
    required: true
  - type: contains
    value: handleHTTPRequest
    required: true
  - type: word
    value: gin.go
    required: true
  - type: response_richness
    value: '4'
    required: true
    description: Referenced 4+ unique source files in dispatch trace
  - type: word
    value: context.go
    required: false
  - type: word
    value: tree.go
    required: false
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
    description: Used structural graph query for dispatch chain tracing
  - type: contains
    value: Engine.HandleContext
    required: false
    description: Surfaced Engine.HandleContext as alternate dispatch entry — baseline
      serendipity from broader gin.go reading
- name: Understand middleware flow
  prompt: 'You''re about to write a new gin middleware. Hand the next agent the map:
    where Context.Next and Context.Abort are defined (file:line), how the handler
    chain is built (the `handlers` slice on Context), where Next actually executes
    the next handler, what Abort does and how it halts execution. Also list every
    internal caller of Context.Next and Context.Abort in production code (not test
    files) with file:line. The follow-up agent should need only small, targeted lookups
    — not a fresh exploration of the package. '
  checks:
  - type: contains
    value: context.go:188
    required: true
  - type: contains
    value: context.go:207
    required: true
  - type: response_richness
    value: '4'
    required: true
    description: Surfaced Next/Abort callers in 4+ files
  - type: word
    value: handlers
    required: false
  - type: word
    value: recovery.go
    required: false
  - type: word
    value: logger.go
    required: false
  - type: word
    value: abortIndex
    required: false
    description: Named the internal constant controlling how Abort halts execution
  - type: word
    value: combineHandlers
    required: false
    description: Named the handler chain construction method in routergroup.go
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
    description: Used structural graph query for Context.Next/Abort caller analysis
  - type: word
    value: AbortWithError
    required: false
    description: Named the AbortWithError variant in the Context.Abort caller enumeration
  - type: contains
    value: math.MaxInt8
    required: false
    description: Named the concrete abortIndex = math.MaxInt8 >> 1 arithmetic
- name: Find dead code in the gin package
  prompt: 'You''re about to open a deletion PR against the gin package. Hand the next
    agent every symbol (function, type, method) in the main gin package (root directory,
    all .go files except _test.go) that is defined but NEVER referenced anywhere else
    — with file:line and a defensible ''no callers'' claim per symbol. Focus on unexported
    (lowercase) symbols. The follow-up agent should need only small, targeted lookups
    — not a fresh exploration of the package. '
  checks:
  - type: word
    value: localhostIP
    required: false
  - type: contains
    value: dead
    required: false
    description: Used dead code terminology in dead code analysis
  - type: response_richness
    value: '3'
    required: false
    description: Referenced 3+ files in dead-code analysis
  - type: no_grep
    value: no_grep
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
    description: Used structural graph query for dead code detection
  - type: contains
    value: binding
    required: false
    description: Found dead code in sub-packages beyond the root gin directory
- name: Assess modifying the recovery middleware
  prompt: 'You''re about to modify Recovery/CustomRecovery in gin to inject a unique
    request ID into the context before the handler chain runs. Produce the edit map:
    call hierarchy with file:line, who calls these functions, where they''re registered
    (including gin.Default), which signatures are public API. The follow-up agent
    should need only small, targeted lookups — not a fresh exploration of the package. '
  checks:
  - type: word
    value: Recovery
    required: true
  - type: word
    value: recovery.go
    required: true
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in modification assessment
  - type: word
    value: CustomRecovery
    required: false
  - type: word
    value: CustomRecoveryWithWriter
    required: false
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
    description: Used blast radius analysis for modification impact
  - type: word
    value: Default
    required: false
    description: Named gin.Default as the automatic registration site for Recovery
scoring:
  weights:
    correctness: 0.7
    efficiency: 0.3
