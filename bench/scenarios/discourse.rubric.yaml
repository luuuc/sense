# Per-scenario rubric for the LLM judge layer.
#
# Multi-turn work session. Per-step criteria use the canonical 40/25/20/15
# weights. The session's headline is cumulative efficiency at held accuracy;
# these per-step scores guard that accuracy does not decay as the session grows.

audience: |
  An AI coding agent working a real task across several steps in one session.
  Each answer must leave the agent (and a teammate) able to act with small,
  targeted follow-up lookups, not a fresh exploration of the codebase. Score for
  that audience. A perfect answer is concrete and file:line-grounded; a weak one
  forces re-exploration.

steps:
  - name: Orient in the codebase
    criteria:
      map_quality: {weight: 0.40, question: "Does the answer give a usable map — what Discourse is, how the code is organized, where request handling and core models live — so the agent can start with targeted lookups?"}
      specificity: {weight: 0.25, question: "Are paths concrete (app/controllers/, app/models/, lib/) rather than vague?"}
      justification: {weight: 0.20, question: "Does it explain the shape of the app (Rails MVC + service objects), not just list folders?"}
      uncertainty: {weight: 0.15, question: "Does it flag that the repo is large with bundled plugins, so the surface is bigger than core?"}
  - name: Trace topic creation to persistence
    criteria:
      map_quality: {weight: 0.40, question: "Does the answer give file:line for each layer of topic creation in execution order (HTTP entry -> NewPostManager -> TopicCreator -> PostCreator -> DB)?"}
      specificity: {weight: 0.25, question: "Are layers pinned to file:line and the call order explicit?"}
      justification: {weight: 0.20, question: "Does it explain why each layer exists (routing/queueing/orchestration), not just name them?"}
      uncertainty: {weight: 0.15, question: "Does it flag alternate entry points (drafts, queue, plugins) that bypass the main path?"}
  - name: Find the topic-creation permission check
    criteria:
      map_quality: {weight: 0.40, question: "Does it locate the Guardian permission method that gates topic creation (can_create_topic?) with file:line, and where it is invoked?"}
      specificity: {weight: 0.25, question: "Is the method named exactly and pinned to lib/guardian/...?"}
      justification: {weight: 0.20, question: "Does it explain the Guardian pattern (centralized per-domain permission concerns)?"}
      uncertainty: {weight: 0.15, question: "Does it flag plugin-extended or category-level permission variants?"}
  - name: Find every caller of the post-creation service
    criteria:
      map_quality: {weight: 0.40, question: "Does it enumerate the call sites that create posts through the service with file:line, INCLUDING the scattered callers in plugins and those reached through wrappers? Completeness is the point — a list of only the obvious core callers is weak and would leave a bypass. This is the relational, grep-hard part."}
      specificity: {weight: 0.25, question: "Are callers pinned to real file:line in core AND plugin paths, not 'various callers'?"}
      justification: {weight: 0.20, question: "Does it distinguish direct calls from wrapper/queued paths?"}
      uncertainty: {weight: 0.15, question: "Does it acknowledge dynamically dispatched or uninstalled-plugin callers it can't confirm?"}
  - name: Find the existing rate-limit pattern to follow
    criteria:
      map_quality: {weight: 0.40, question: "Does it find the RateLimiter implementation and at least one real usage site to copy, with file:line?"}
      specificity: {weight: 0.25, question: "Is the class and a concrete usage pinned to file:line (lib/rate_limiter.rb + a caller)?"}
      justification: {weight: 0.20, question: "Does it explain how the pattern is applied (where the limit is checked and raised)?"}
      uncertainty: {weight: 0.15, question: "Does it note there are multiple rate-limit styles and pick the one matching this feature?"}
  - name: Find what reacts to post creation
    criteria:
      map_quality: {weight: 0.40, question: "Does it enumerate the reactors that fire on post creation (notifications, badges, review queue, webhooks, plugin event handlers) with file:line? Reward reaching the scattered plugin/event reactors, not just inline calls."}
      specificity: {weight: 0.25, question: "Are reactors named and pinned to file:line, including plugin event handlers?"}
      justification: {weight: 0.20, question: "Does it explain how reactions are wired (direct calls vs DiscourseEvent vs enqueued jobs)?"}
      uncertainty: {weight: 0.15, question: "Does it flag that plugins subscribe dynamically, so the list may be incomplete?"}
  - name: Produce the edit map
    criteria:
      map_quality: {weight: 0.40, question: "Does it synthesize an actionable edit map: files to change + guard location, the pattern to follow, reactors to check, and specs to update, all with file:line, such that a teammate could open the PR from it?"}
      specificity: {weight: 0.25, question: "Are the change sites, pattern, and specs named concretely?"}
      justification: {weight: 0.20, question: "Does it justify the guard placement (why there, covering all callers) and the spec choices?"}
      uncertainty: {weight: 0.15, question: "Does it flag residual risks (plugin callers/reactors, bypass paths) to verify before shipping?"}
