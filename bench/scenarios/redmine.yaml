name: Redmine work session - add support for a new source-control system
repo: redmine
# Single-prompt session bench (run via bench/bench-sense-local.sh): all steps are
# presented in ONE prompt and worked in order, so context accumulates the way a
# real work session does. Rendered to the agent: the description + each step's
# name and prompt ONLY (checks/gold are NOT shown). Everything rendered is kept
# NEUTRAL, it states the task, never the answer's shape, file paths, class or
# method names, counts, or which tool to reach for. The recurring real task this
# mirrors is "add support for a new version-control system": each SCM is a PAIR of
# classes tied only by naming convention, a Repository::X model (capabilities,
# changeset fetching) and an X_adapter that shells out to the VCS (subclassing
# Redmine::Scm::Adapters::AbstractAdapter, contract: info/entries/revisions/diff/
# cat/branches/tags), registered via Redmine::Scm::Base and resolved by
# Repository#scm_adapter_class. This walks the dispatch, the adapter fan-out (6
# adapters, AbstractAdapter blast 59), the repository-model fan-out (6 subclasses,
# Repository blast 39), the registry, and the test matrix. The headline is
# CUMULATIVE efficiency (tool calls, billed + context tokens, time) at held
# accuracy: the baseline re-derives the structure each step while the map is
# queried once and reused.
description: 'You are a maintainer about to add support for a new source-control
  system so projects can browse repositories hosted with it, mirroring how the
  existing version-control integrations are built. Work through the tasks below one
  at a time; each builds on what you learned in the previous one. Keep every answer
  concrete with file:line so the next step (and a teammate opening the PR) can act
  without re-exploring the codebase.'
steps:
- name: Orient in the codebase
  prompt: "Task: orient yourself. In a few sentences plus file paths, what is this
    project, how is the code organized, and where does the machinery that lets a
    project browse the history and files of a repository under different
    version-control systems live, along with the shared pieces it is built on?
    Hand the next agent a map so they can act with small, targeted lookups, not a
    fresh exploration of the codebase. No Explore agents.
    "
  checks:
  - type: word
    value: Repository
    required: true
  - type: word
    value: scm
    required: false
    description: Reached the version-control abstraction, not just the repository record
  - type: response_richness
    value: '3'
    required: false
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_conventions
    required: false
    layer: adoption
- name: Trace how a repository's data is read from the version-control tool
  prompt: "Task: trace how a request for a repository's files or history reaches the
    component that actually runs the underlying version-control tool. Start from the
    stored repository and follow it down to where the right tool-specific component
    is selected and invoked. Give file:line for each layer and the order they run.
    "
  checks:
  - type: word
    value: adapter
    required: true
    description: Found the tool-specific component that runs the VCS
  - type: word
    value: Repository
    required: true
  - type: response_richness
    value: '4'
    required: true
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Map the version-control command family and its contract
  prompt: "Task: a new integration will be built on the same shared base that the
    existing tool-specific components are built on, then customize a few pieces. Map
    the shared contract such a component must implement to read history, files, and
    diffs, and which existing integrations customize that behavior and how each one
    differs. Be complete with file:line; a missed method is functionality the new
    integration silently won't support.
    "
  checks:
  - type: word
    value: AbstractAdapter
    required: true
  - type: word
    value: revisions
    required: true
    description: Anchored on the history/diff contract every adapter implements
  - type: response_richness
    value: '6'
    required: true
    description: Enumerated the shared base plus the per-tool customizations
  - type: contains
    value: abstract_adapter.rb
    required: false
  - type: no_grep
    value: no_grep
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Map the stored-repository family and its contract
  prompt: "Task: each version-control system also has its own stored-repository
    type, paired with its command component. Map the shared base these stored types
    are built on, the capabilities and identity each must declare, and the
    existing per-system types and how each one pairs with its command component. Be
    complete with file:line.
    "
  checks:
  - type: word
    value: Repository
    required: true
  - type: word
    value: scm_name
    required: false
    description: Found the per-system identity each repository type declares
  - type: response_richness
    value: '5'
    required: true
    description: Enumerated the repository base plus the per-system subtypes
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
- name: Map where the available version-control systems are registered
  prompt: "Task: the set of version-control systems the application offers is
    declared in one place so the system and the admin UI know the full set. Map
    where that declaration lives, what it lists, and where the UI offers the choice
    when a repository is configured. Be complete with file:line.
    "
  checks:
  - type: word
    value: scm
    required: true
  - type: word
    value: available_scm
    required: false
    description: Found the registry of available systems
  - type: response_richness
    value: '4'
    required: true
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
- name: Find every site that must change to add a new source-control system
  prompt: "Task: you will add the new system. Find every place in the codebase that
    must change for its stored-repository type and its command component to exist,
    be registered, be selectable, browse history and files, and be tested,
    including where the shared bases are depended on. Be complete and use file:line;
    a missed site means the new system can't be configured or is untested.
    "
  checks:
  - type: word
    value: Repository
    required: true
  - type: word
    value: adapter
    required: true
  - type: response_richness
    value: '6'
    required: true
    description: Reached the registry and the test matrix, not just one new file
  - type: contains
    value: test
    required: false
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
- name: Produce the edit map
  prompt: "Task: produce the complete edit map for adding the new source-control
    system: which files to create and which to change across each area you explored
    (the stored-repository type, the command component, the registration, the
    selection UI, the dispatch that resolves them), and which tests and fixtures to
    add. Use file:line throughout, so a teammate could open the PR from your map
    alone.
    "
  checks:
  - type: response_richness
    value: '6'
    required: true
  - type: contains
    value: test
    required: false
  - type: contains
    value: adapter
    required: false
scoring:
  weights:
    correctness: 0.70
    efficiency: 0.30
# Gold spans the areas the "add an SCM" session walks. The discriminator is the
# twin fan-out tied only by naming convention: the `adapters` group (per-tool
# command components subclassing Redmine::Scm::Adapters::AbstractAdapter, blast 59)
# and the `repositories` group (per-system Repository subclasses, blast 39). The
# adapter<->model pairing and the dispatch (Repository#scm_adapter_class resolving
# a class by name) are grep-invisible relationships. The `dispatch` group (the
# base + registry + controller) is the grep-hard routing seam. All targets are
# file-path matched so both mention and cited are scored. Headline is CUMULATIVE
# efficiency at held accuracy.
gold:
  # dispatch / registry, resolve a stored repository to its tool component + the registry + UI
  - {id: repository-base,   group: dispatch,     match: [models/repository.rb]}
  - {id: scm-registry,      group: dispatch,     match: [scm/base.rb]}
  - {id: repos-controller,  group: dispatch,     match: [repositories_controller.rb]}
  # the command-component fan-out (subclasses of AbstractAdapter, grep-invisible inheritance)
  - {id: adapter-base,      group: adapters,     match: [scm/adapters/abstract_adapter.rb]}
  - {id: adapter:subversion,group: adapters,     match: [scm/adapters/subversion_adapter.rb]}
  - {id: adapter:git,       group: adapters,     match: [scm/adapters/git_adapter.rb]}
  - {id: adapter:mercurial, group: adapters,     match: [scm/adapters/mercurial_adapter.rb]}
  - {id: adapter:bazaar,    group: adapters,     match: [scm/adapters/bazaar_adapter.rb]}
  - {id: adapter:cvs,       group: adapters,     match: [scm/adapters/cvs_adapter.rb]}
  - {id: adapter:filesystem,group: adapters,     match: [scm/adapters/filesystem_adapter.rb]}
  # the stored-repository fan-out (subclasses of Repository, paired with adapters by convention)
  - {id: repo:subversion,   group: repositories, match: [models/repository/subversion.rb]}
  - {id: repo:git,          group: repositories, match: [models/repository/git.rb]}
  - {id: repo:mercurial,    group: repositories, match: [models/repository/mercurial.rb]}
  - {id: repo:bazaar,       group: repositories, match: [models/repository/bazaar.rb]}
  - {id: repo:cvs,          group: repositories, match: [models/repository/cvs.rb]}
  - {id: repo:filesystem,   group: repositories, match: [models/repository/filesystem.rb]}
  # test matrix, per-system adapter tests + repository tests
  - {id: test:adapter-git,  group: tests,        match: [scm/adapters/git_adapter_test.rb]}
  - {id: test:adapter-svn,  group: tests,        match: [scm/adapters/subversion_adapter_test.rb]}
  - {id: test:repo-git,     group: tests,        match: [repository_git_test.rb]}
  - {id: test:repo-svn,     group: tests,        match: [repository_subversion_test.rb]}
