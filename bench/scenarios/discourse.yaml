name: Discourse topic creation flow and authorization tracing
repo: discourse
description: 'Trace the Discourse topic creation flow from the HTTP controller

  through service objects to database persistence. Understand the

  Guardian authorization system and then assess the impact of

  adding a new permission check to the topic creation pipeline.

  '
steps:
- name: Orient in the Discourse codebase
  prompt: "You're an AI coding agent about to ship work into Discourse.
    Hand the next agent the map they need to act: what Discourse does,
    its top-level structure, the key abstractions (Guardians, services,
    serializers) with file paths, and the entry points to start reading.
    The follow-up agent should need only small, targeted lookups — not
    a fresh exploration of the codebase. No Explore agents.
    "
  checks:
  - type: word
    value: Guardian
    required: true
  - type: word
    value: Topic
    required: true
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in orientation
  - type: word
    value: service
    required: false
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
    description: Used semantic search for Guardian/authorization orientation
- name: Trace topic creation from controller to persistence
  prompt: "You're about to add a permission check to topic creation.
    Produce the map your downstream edits will need: file:line for every
    layer in the creation flow (HTTP entry through TopicCreator and
    PostCreator service objects to database persistence), the call-order
    between them, and any alternate entry sites that would be affected.
    The follow-up agent should need only small, targeted lookups — not
    a fresh exploration of the codebase.
    "
  checks:
  - type: word
    value: TopicsController
    required: true
  - type: word
    value: TopicCreator
    required: true
  - type: word
    value: PostCreator
    required: true
  - type: response_richness
    value: '5'
    required: true
    description: Referenced 5+ files in the creation flow trace
  - type: word
    value: PostsController
    required: true
    description: Named the actual HTTP entry point for topic creation
  - type: no_grep
    value: no_grep
    required: false
    layer: adoption
  - type: word
    value: NewPostManager
    required: false
    description: Named the intermediary routing layer between controller and PostCreator
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
    description: Used semantic search for topic creation flow tracing
- name: Understand Guardian authorization
  prompt: "You're about to extend Guardian with a new permission check.
    Map the Guardian methods that gate topic creation with file:line: where
    Guardian is instantiated, which methods are called along the path, and
    which concern files own each check. Connect Guardian usage to
    serializer surfaces if relevant. The follow-up agent should need only
    small, targeted lookups — not a fresh exploration of the codebase.
    "
  checks:
  - type: word
    value: topic_guardian
    required: true
  - type: word
    value: can_create_topic
    required: true
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in Guardian analysis
  - type: contains
    value: ensure
    required: false
  - type: word
    value: can_create_topic_on_category
    required: false
    description: Named the intermediate Guardian method in the permission chain
  - type: word
    value: CurrentUserSerializer
    required: true
    description: Connected Guardian permissions to frontend serialization layer
- name: Assess impact of adding a permission check
  prompt: "You're about to add a permission: only users who have been
    members for >24 hours can create topics. Produce the edit map:
    which Guardian method changes, where it's invoked in the create
    flow, which specs need updating, which alternate paths (queue, drafts,
    plugin overrides) are affected. Use file:line throughout. The
    follow-up agent should need only small, targeted lookups — not a
    fresh exploration of the codebase.
    "
  checks:
  - type: word
    value: Guardian
    required: true
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in impact assessment
  - type: word
    value: spec
    required: false
  - type: word
    value: plugin
    required: false
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
    description: Used blast radius analysis for permission change impact
  - type: contains
    value: spam_rules_spec
    required: false
    description: Warned about specific test breakage from permission change
  - type: contains
    value: reply_as_new_topic
    required: false
    description: Identified permission gap in topic reply path
  - type: contains
    value: queue
    required: false
    description: Flagged queue-vs-reject behavioral impact
scoring:
  weights:
    correctness: 0.70
    efficiency: 0.30
