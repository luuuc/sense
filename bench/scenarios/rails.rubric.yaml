# Per-scenario rubric for the LLM judge layer.
#
# Audience block is shared across all steps. This rubric OPTS INTO the fifth
# `relationship` (chain-correctness) criterion — so the judge runs on
# judge_prompt.v2.md and every step declares all five criteria. Weights per step
# sum to 1.0: map_quality 0.35 / specificity 0.20 / justification 0.15 /
# uncertainty 0.10 / relationship 0.20.
#
# WHY relationship here: the Rails win is the scattered fan-out of the
# ActiveRecord::Relation contract — the lazy query object every finder/scope/
# association returns. Recall separates the arms on the scattered dependents: the
# fully-qualified `ActiveRecord::Relation` appears in only ~13 of activerecord/lib's
# 401 files, so the dependents that reach it by short name, by building a relation,
# or by a `===` type test are invisible to a name search and drowned by the noisy
# bare word `relation`, while the gem is far too large to read whole.
# `relationship` measures the orthogonal axis: does the answer state HOW each
# dependent reaches Relation (executes it under a role/shard, `=== Relation` to
# inline its SQL, extends it with signed-id finders, renders it as a table in
# another gem), which grep can name endpoints for but cannot assemble.
#
# Step names MUST match scenarios/rails.yaml exactly (the judge pairs by name).

audience: |
  An AI coding agent that will use this answer to safely rework the
  ActiveRecord::Relation contract in the Rails framework with only small, targeted
  follow-up lookups, not a fresh exploration of the codebase. Score for that
  audience, not a human reader, not a docs page. A perfect answer leaves the agent
  able to change how a relation is spawned/merged/executed knowing every dependent
  that must be reviewed AND how each one is connected — including the scattered call
  sites elsewhere in activerecord/lib and the dependents in other gems (the
  Enumerable core-ext, the rails query command); a weak answer forces the agent to
  re-read hundreds of files or grep a name that misses or a word that drowns before
  it can act safely.

steps:
  - name: Orient in the codebase
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer hand the agent a usable map: that this is Ruby on Rails
          (the framework itself, a monorepo of gems), and specifically where the
          lazy query object sits (ActiveRecord::Relation in activerecord/lib), the
          value a finder/scope/association returns and that accumulates a query as it
          is chained? Could the agent pick an entry point and start working with only
          small, targeted lookups?
      specificity:
        weight: 0.20
        question: |
          Are the cited paths concrete (activerecord/lib/active_record/relation.rb,
          the relation/ subdir of query modules) rather than vague ("the query
          layer")? Are abstractions tied to actual files and class names?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY the architecture is shaped this way (a finder
          or scope returns a lazy Relation that is chained and only executed when
          enumerated; the query interface is split into mixed-in modules), not just
          NAME the pieces?
      uncertainty:
        weight: 0.10
        question: |
          Where the answer is unsure about how the layers connect, does it flag
          that so the agent doesn't act blindly?
      relationship:
        weight: 0.20
        question: |
          Does the orientation state the CONNECTING RELATIONSHIPS — that a
          finder/scope/association returns a Relation, that chaining spawns a new
          one, that the query interface is mixed in from modules — rather than only
          listing where things live? An orientation that names directories and files
          without the relations that link them scores low.

  - name: Map the Relation contract and what it is built on
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer map the Relation object's contract with file:line: the
          query-building, finder, calculation, spawning and delegation modules mixed
          into it (QueryMethods, FinderMethods, Calculations, SpawnMethods,
          Delegation) that make up its query interface? Could the agent know what a
          change to the relation has to preserve?
      specificity:
        weight: 0.20
        question: |
          Are the contract pieces named concretely by file
          (relation/query_methods.rb, relation/finder_methods.rb,
          relation/spawn_methods.rb, relation/delegation.rb) rather than "the query
          modules"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY the contract is shaped this way (the query
          interface composed from focused modules, chaining handled by spawn/merge,
          model-class methods reached through delegation), not just LIST the pieces?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag any part of the contract it could not confirm (a
          module method or delegation it didn't open) so the agent checks before
          relying on it?
      relationship:
        weight: 0.20
        question: |
          For each contract piece, does the answer state the RELATION by which it
          binds to the relation object — which module supplies which part of the
          query interface, how spawn/merge clone it on chaining, how delegation
          routes to the model class — not merely name the file? Naming a module file
          without saying how it connects scores low.

  - name: Trace how a query is built up and executed
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer trace the build-and-execute path with file:line, in order:
          from where a finder/scope returns a relation, through how chaining spawns a
          new relation and merges conditions (SpawnMethods#spawn/merge, the merger),
          to where the accumulated query is compiled to SQL and executed? Could the
          agent follow the same path to change query building safely?
      specificity:
        weight: 0.20
        question: |
          Are the pieces named exactly (SpawnMethods#spawn, the relation merger,
          QueryMethods, the execution path) with file:line, rather than "the query
          code"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY chaining spawns a fresh relation (immutability
          of an unexecuted relation) and why execution is deferred, not just LIST the
          call chain?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag where the path is lazy or relies on spawn/merge
          semantics it didn't fully open, so the agent verifies?
      relationship:
        weight: 0.20
        question: |
          Does the answer assemble the path as an explicit CHAIN — finder/scope ->
          spawn a relation -> merge conditions -> compile to SQL -> execute — written
          as a connected path rather than a set of files? A list that does not state
          the route/order scores low.

  - name: Audit every dependent of the Relation contract
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer enumerate the FULL scattered dependent set of the Relation
          object, grouped by area: the query-interface modules (query/finder/
          calculation/spawn/delegation) — AND, CRUCIALLY, the call sites elsewhere in
          activerecord/lib that build, type-check, execute or extend a relation
          WITHOUT naming the class: connection role/shard execution
          (connection_handling), SQL bind-variable inlining (sanitization's
          `=== Relation`), the collection cache key (integration), encrypted
          deterministic query rewriting (encryption), signed-id relation finders
          (signed_id), eager-load join construction (associations/join_dependency),
          named-scope definition (scoping/named) — AND the dependents in OTHER gems:
          the ActiveSupport Enumerable core-ext that mirrors Relation#pick, and the
          Railties query command that renders a relation as a table? This scattered,
          mostly-unqualified fan-out is the heart of the ticket: the fully-qualified
          class name appears in only ~13 of 401 files, so reading the query directory
          alone misses the call sites that reach a relation by short name or across a
          gem boundary. A strong answer names that breadth with file:line.
      specificity:
        weight: 0.20
        question: |
          Are the dependents named concretely by file and symbol
          (active_record/sanitization.rb, active_record/connection_handling.rb,
          active_record/signed_id.rb, associations/join_dependency.rb,
          activesupport/.../core_ext/enumerable.rb,
          railties/.../commands/query/query_command.rb) with file:line and one phrase
          on how each uses the relation, rather than "various query helpers"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY each dependent is affected (executes a relation
          under a role, inlines its SQL via a type test, computes a cache key over
          it, rewrites its where-values, extends it with finders, renders it),
          grouping by area rather than just LISTING files?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer acknowledge what a static pass can miss (dependents that
          reach the relation only by short name, a `===` test, or that live in
          another gem) so the agent knows to verify?
      relationship:
        weight: 0.20
        question: |
          For each dependent, does the answer state HOW it reaches the relation — the
          short-name reference, the `ActiveRecord::Relation === value` type test, the
          RelationMethods extension, the cross-gem mirror/render — ESPECIALLY for the
          unqualified and cross-gem dependents that a name search cannot reach? A
          correct file list with no connecting relationship stated per dependent
          scores low, however complete the list.

  - name: Trace how relation behavior is reused for associations
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer give file:line for how an association collection reuses the
          relation query interface (what CollectionProxy subclasses or delegates to)
          and where association queries are built (the association scope)? Could the
          agent change relation behavior knowing the association path inherits it?
      specificity:
        weight: 0.20
        question: |
          Are the pieces named exactly (CollectionProxy, AssociationScope, the
          association query build) with file:line, rather than "the association code"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY the association collection is built on the
          relation (so association queries get the same chainable interface), not
          just NAME the pieces?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag where the association reuse relies on subclassing or
          delegation it didn't fully open, so the agent verifies?
      relationship:
        weight: 0.20
        question: |
          Does the answer state the path — association collection -> CollectionProxy
          subclasses/delegates to Relation -> association scope builds the query —
          rather than naming the pieces in isolation? A piece named without the
          relation it sits in scores low.

  - name: Assess the blast radius of the contract change
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer assess the full blast radius of changing the Relation
          contract: which dependents are at risk across every area (the query
          modules, the scattered call sites in activerecord/lib, the cross-gem
          dependents), which are most likely to break, and what must be re-verified,
          with file:line and a risk ranking? This is the change-impact question a
          structural blast answers directly and a hand audit of the query directory
          under-covers.
      specificity:
        weight: 0.20
        question: |
          Are the at-risk dependents named concretely by file with a stated reason
          for the risk level, rather than "several things might break"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY a given dependent is high vs low risk (it
          spawns/merges/executes a relation on the changed path vs merely renders a
          loaded one), not just LIST them?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag the dependents it is least sure about (the unqualified
          or cross-gem ones, only surfaced structurally) so the agent confirms?
      relationship:
        weight: 0.20
        question: |
          Does the risk assessment tie each at-risk dependent to the RELATIONSHIP
          that makes it risky — expressing impact as a path from the Relation change
          to the dependent (merges conditions vs inlines SQL via a type test vs
          renders a loaded relation in another gem) — rather than a ranked file list
          with risk labels but no connecting route?

  - name: Produce the change + verification map
    criteria:
      map_quality:
        weight: 0.35
        question: |
          Does the answer produce a complete, actionable map: the relation object and
          query modules to edit (relation.rb, spawn/merge, query_methods), every
          dependent that must be reviewed grouped by area (including the scattered
          call sites and the cross-gem dependents), and the tests or fixtures to
          update or add, with file:line throughout? Could a teammate land the change
          from this map alone?
      specificity:
        weight: 0.20
        question: |
          Are the files and insertion points concrete
          (active_record/relation.rb, relation/spawn_methods.rb,
          active_record/sanitization.rb, the cross-gem dependents, the tests under
          activerecord/test) rather than "edit the relation and add tests"?
      justification:
        weight: 0.15
        question: |
          Does the answer explain WHY each file is in the map (which area it belongs
          to and what the Relation change does to it), not just LIST files?
      uncertainty:
        weight: 0.10
        question: |
          Does the answer flag the parts it is least sure about (unqualified or
          cross-gem dependents, spawn/merge semantics, fixtures) so the agent
          confirms before committing?
      relationship:
        weight: 0.20
        question: |
          Does the map connect each file to the change via its relationship — which
          short-name reference / type test / cross-gem use makes it part of this
          edit, and which test exercises which path — so the chain from the Relation
          change to each edited or verified file is explicit, not just a grouped file
          list?
