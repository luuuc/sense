version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - gosec
    - ineffassign
    - unconvert
    - gocritic
    - exhaustive
    - unused
    - misspell
    - dupword
    - revive
    - nolintlint
    - depguard
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    nolintlint:
      require-explanation: true
      require-specific: true
    depguard:
      # Goal 5 (no side effects), enforced at compile time: the verified
      # pure-core packages may not reach for effects. They take bytes and
      # return data; effects live at the edges (scan, watch, search's
      # ripgrep, dead/eval's analyzers, the ONNX shell). This set is locked
      # at today's import-clean state and GROWS as later pitches clean more
      # packages — never add a package that legitimately shells out.
      rules:
        pure-core:
          files:
            - "**/internal/extract/**"
            - "**/internal/blast/**"
            - "**/internal/conventions/**"
            - "**/internal/mcpio/**"
            - "**/internal/model/**"
          deny:
            - pkg: os/exec
              desc: "pure-core must not shell out; inject the effect at the edge"
            - pkg: net
              desc: "pure-core must not touch the network; inject the effect at the edge"
            - pkg: syscall
              desc: "pure-core must not call syscalls directly; inject the effect at the edge"
            - pkg: github.com/fsnotify/fsnotify
              desc: "pure-core must not watch the filesystem; that is the watch package's job"
  exclusions:
    paths:
      - bench/lib/test_fixtures
    rules:
      # dupword: SQL NULL repetitions and embedded Ruby/test fixtures are fine
      - linters: [dupword]
        path: _test\.go
      - linters: [dupword]
        path: cmd/sense/main\.go
      # gosec: test files legitimately use weak RNG, broad perms, variable paths
      - linters: [gosec]
        path: _test\.go
      # gosec: benchmark fixtures use weak RNG and broad file ops
      - linters: [gosec]
        path: internal/benchmark/
      # gosec: suppress rules that are false positives for a CLI tool
      - linters: [gosec]
        text: "G118:"
      - linters: [gosec]
        text: "G202:"
      - linters: [gosec]
        text: "G204:"
      - linters: [gosec]
        text: "G301:"
      - linters: [gosec]
        text: "G302:"
      - linters: [gosec]
        text: "G304:"
      - linters: [gosec]
        text: "G306:"
      - linters: [gosec]
        text: "G602:"
      - linters: [gosec]
        text: "G703:"
      # revive: don't require doc comments on every export — CLI tool, not a library
      - linters: [revive]
        text: "exported: "
      - linters: [revive]
        text: "package-comments: "
      # revive: blank imports are used for side-effect registration (SQLite driver, extractors)
      - linters: [revive]
        text: "blank-imports: "
      # revive: indent-error-flow is noisy in CLI command handlers
      - linters: [revive]
        text: "indent-error-flow: "

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      # Settle imports into stdlib / external / internal (github.com/luuuc/sense)
      # groups so future diffs stay stable.
      local-prefixes:
        - github.com/luuuc/sense
  exclusions:
    paths:
      - bench/lib/test_fixtures
