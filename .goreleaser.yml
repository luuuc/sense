version: 2

before:
  hooks:
    - ./scripts/fetch-deps.sh

builds:
  - id: sense
    main: ./cmd/sense
    binary: sense
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
      - -X github.com/luuuc/sense/internal/version.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    overrides:
      - goos: darwin
        goarch: arm64
        env:
          - CC=oa64-clang
          - CXX=oa64-clang++
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

archives:
  - id: sense
    ids: [sense]
    formats: [tar.gz]
    name_template: "sense_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "sense_{{ .Version }}_checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "^refactor:"

release:
  github:
    owner: luuuc
    name: sense
  prerelease: auto
  make_latest: true
