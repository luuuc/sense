<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400">
  <style>
    text { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, Consolas, monospace; }
  </style>

  <!-- Background -->
  <rect width="880" height="400" rx="8" fill="#0a0d12"/>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" fill="#6b7689" font-size="10.5" letter-spacing="2px">REFACTOR A SYMBOL SAFELY · CLAUDE CODE</text>

  <!-- ═══════════ LEFT PANEL: Without Sense ═══════════ -->
  <rect x="20" y="46" width="410" height="340" rx="6" fill="#0d1118" stroke="#1b2230" stroke-width="1"/>

  <text x="40" y="72" fill="#e6ecf5" font-size="13" font-weight="600">Without Sense</text>
  <line x1="40" y1="86" x2="410" y2="86" stroke="#1b2230" stroke-width="1"/>

  <!-- Tool calls -->
  <text x="40" y="108" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Bash</tspan><tspan fill="#6b7689">  grep -rn "AuthService" *.go</tspan></text>
  <text x="40" y="130" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Read</tspan><tspan fill="#6b7689">  src/handlers/user.go</tspan></text>
  <text x="40" y="152" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Bash</tspan><tspan fill="#6b7689">  grep -rn "auth" --include=*.go</tspan></text>
  <text x="40" y="174" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Read</tspan><tspan fill="#6b7689">  src/services/auth.go</tspan></text>
  <text x="40" y="196" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Read</tspan><tspan fill="#6b7689">  src/models/user.go</tspan></text>
  <text x="40" y="218" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Bash</tspan><tspan fill="#6b7689">  grep -l "AuthService" *.go</tspan></text>
  <text x="40" y="240" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Read</tspan><tspan fill="#6b7689">  src/middleware/auth.go</tspan></text>
  <text x="40" y="262" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Read</tspan><tspan fill="#6b7689">  src/routes/api.go</tspan></text>
  <text x="40" y="284" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Bash</tspan><tspan fill="#6b7689">  find . -name "*.go" -exec grep</tspan></text>
  <text x="40" y="306" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#7ba7c4">Read</tspan><tspan fill="#6b7689">  src/db/queries.go</tspan></text>
  <text x="56" y="328" fill="#454e5f" font-size="11.5" font-style="italic">...9 more tool calls</text>

  <!-- Stats divider -->
  <line x1="40" y1="342" x2="410" y2="342" stroke="#1b2230" stroke-width="1"/>

  <!-- Stats -->
  <text x="86" y="366" text-anchor="middle" fill="#e6ecf5" font-size="18" font-weight="500">19</text>
  <text x="86" y="380" text-anchor="middle" fill="#454e5f" font-size="9" letter-spacing="1.2px">CALLS</text>
  <text x="178" y="366" text-anchor="middle" fill="#e6ecf5" font-size="18" font-weight="500">356K</text>
  <text x="178" y="380" text-anchor="middle" fill="#454e5f" font-size="9" letter-spacing="1.2px">TOKENS</text>
  <text x="270" y="366" text-anchor="middle" fill="#e6ecf5" font-size="18" font-weight="500">121s</text>
  <text x="270" y="380" text-anchor="middle" fill="#454e5f" font-size="9" letter-spacing="1.2px">TIME</text>
  <text x="362" y="366" text-anchor="middle" fill="#e6ecf5" font-size="18" font-weight="500">0.80</text>
  <text x="362" y="380" text-anchor="middle" fill="#454e5f" font-size="9" letter-spacing="1.2px">SCORE</text>

  <!-- ═══════════ RIGHT PANEL: With Sense ═══════════ -->
  <rect x="450" y="46" width="410" height="340" rx="6" fill="#0d1118" stroke="#1b2230" stroke-width="1"/>

  <text x="470" y="72" fill="#e6ecf5" font-size="13" font-weight="600">With Sense</text>
  <line x1="470" y1="86" x2="840" y2="86" stroke="#1b2230" stroke-width="1"/>

  <!-- Tool calls -->
  <text x="470" y="108" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#5aade0">sense_blast</tspan><tspan fill="#6b7689">  "AuthService"</tspan></text>
  <text x="470" y="130" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#5aade0">sense_graph</tspan><tspan fill="#6b7689">  "AuthService" callers</tspan></text>
  <text x="470" y="152" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#5aade0">Read</tspan><tspan fill="#6b7689">  src/services/auth.go</tspan></text>
  <text x="470" y="174" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#5aade0">Edit</tspan><tspan fill="#6b7689">  src/services/auth.go</tspan></text>
  <text x="470" y="196" font-size="11.5"><tspan fill="#454e5f">▸ </tspan><tspan fill="#5aade0">Read</tspan><tspan fill="#6b7689">  src/handlers/user.go</tspan></text>

  <!-- Stats divider -->
  <line x1="470" y1="342" x2="840" y2="342" stroke="#1b2230" stroke-width="1"/>

  <!-- Stats (accent colored) -->
  <text x="516" y="366" text-anchor="middle" fill="#5aade0" font-size="18" font-weight="500">5</text>
  <text x="516" y="380" text-anchor="middle" fill="#454e5f" font-size="9" letter-spacing="1.2px">CALLS</text>
  <text x="608" y="366" text-anchor="middle" fill="#5aade0" font-size="18" font-weight="500">109K</text>
  <text x="608" y="380" text-anchor="middle" fill="#454e5f" font-size="9" letter-spacing="1.2px">TOKENS</text>
  <text x="700" y="366" text-anchor="middle" fill="#5aade0" font-size="18" font-weight="500">48s</text>
  <text x="700" y="380" text-anchor="middle" fill="#454e5f" font-size="9" letter-spacing="1.2px">TIME</text>
  <text x="792" y="366" text-anchor="middle" fill="#5aade0" font-size="18" font-weight="500">0.93</text>
  <text x="792" y="380" text-anchor="middle" fill="#454e5f" font-size="9" letter-spacing="1.2px">SCORE</text>
</svg>
