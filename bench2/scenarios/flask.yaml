name: Flask WSGI dispatch trace and debug instrumentation
repo: flask
description: 'Trace the Flask WSGI request dispatch pipeline end-to-end, locate

  the test coverage for the core dispatch, then assess what would

  break if you added a debug parameter to wsgi_app. A realistic

  pre-refactoring task that tests call-graph traversal, test-file

  mapping, and impact awareness.

  '
steps:
- name: Trace the request dispatch pipeline
  prompt: 'You''re about to insert a request-scoped hook into Flask''s dispatch pipeline.
    Hand the next agent the map: starting from `Flask.wsgi_app`, list every method
    called in order through to `finalize_request`, each with file:line, one-line behaviour,
    and what it calls next. Cover the full chain: wsgi_app → full_dispatch_request
    → preprocess_request → dispatch_request → finalize_request → make_response → process_response.
    No Explore agents. The follow-up agent should need only small, targeted lookups
    — not a fresh exploration of the codebase. '
  checks:
  - type: word
    value: wsgi_app
    required: true
    description: Core dispatch entry point
  - type: word
    value: full_dispatch_request
    required: true
    description: Main dispatch orchestrator
  - type: word
    value: preprocess_request
    required: true
    description: URL preprocessors + before_request chain
  - type: word
    value: dispatch_request
    required: true
    description: URL rule match → view function call
  - type: word
    value: finalize_request
    required: true
    description: Response building + after_request chain
  - type: word
    value: make_response
    required: true
    description: Return value → Response conversion
  - type: word
    value: process_response
    required: true
    description: Session save + response finalisation
  - type: response_richness
    value: '2'
    required: true
    description: Referenced 5+ unique source files in the trace
  - type: word
    value: app.py
    required: false
    description: Identified the primary source file
- name: Find internal callers of wsgi_app
  prompt: 'You''re about to change the signature of `Flask.wsgi_app`. Hand the next
    agent every internal caller within the Flask source (src/flask/, excluding tests)
    with file:line and enclosing function or method, so they can update every site
    in one pass. The follow-up agent should need only small, targeted lookups — not
    a fresh exploration of the codebase. '
  checks:
  - type: word
    value: __call__
    required: true
    description: Flask.__call__ is the internal caller
  - type: contains
    value: wsgi_app
    required: true
    description: Mentions wsgi_app in caller analysis
  - type: response_richness
    value: '2'
    required: false
    description: Found callers across 3+ files
  - type: no_grep
    value: no_grep
    required: false
    layer: adoption
    description: Used structural tools, not raw grep
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
    description: Used structural call graph to find wsgi_app callers
  - type: contains
    value: app.py:1625
    required: false
    description: Cited the precise line:col where __call__ invokes wsgi_app
- name: Locate test coverage for the dispatch pipeline
  prompt: 'You''re about to change dispatch behavior in Flask. Hand the next agent
    the test files that will need to be re-run or updated: coverage for Flask.wsgi_app
    and the dispatch pipeline methods under tests/, with path and the key test function
    names inside each. The follow-up agent should need only small, targeted lookups
    — not a fresh exploration of the test tree. '
  checks:
  - type: word
    value: test_basic.py
    required: true
    description: Main test file for basic app behavior
  - type: response_richness
    value: '2'
    required: true
    description: Referenced 3+ test files
  - type: contains
    value: test_
    required: false
    description: Identified specific test functions
  - type: word
    value: test_blueprints.py
    required: false
    description: Identified blueprint-level request processing tests that exercise
      the dispatch pipeline
- name: Assess impact of adding a debug parameter
  prompt: 'You''re about to add a keyword-only parameter `_trace: bool = False` to
    `Flask.wsgi_app`. Produce the edit map for the next agent: every file that needs
    modification with file:line, every symbol/function directly affected, subclass/middleware
    compatibility concerns, and whether internal __call__ needs updating. The follow-up
    agent should need only small, targeted lookups — not a fresh exploration of the
    codebase. '
  checks:
  - type: word
    value: __call__
    required: true
    description: Identified __call__ needs updating
  - type: word
    value: wsgi_app
    required: true
    description: Discussed wsgi_app signature implications
  - type: response_richness
    value: '2'
    required: false
    description: Referenced 4+ files in impact assessment
  - type: contains
    value: subclass
    required: false
    description: Flagged subclassing compatibility concern
  - type: contains
    value: middleware
    required: false
    description: Considered middleware wrapping pattern
  - type: word
    value: AppContext
    required: false
    description: Traced context push lifecycle as part of dispatch
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
    description: Used blast radius analysis for wsgi_app signature change impact
scoring:
  weights:
    correctness: 0.7
    efficiency: 0.3
