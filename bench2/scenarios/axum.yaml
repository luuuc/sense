name: Axum Handler trait propagation and request context layer assessment
repo: axum
description: 'Trace how the Axum Handler trait propagates through the Tower service

  stack and extractor chain. Then assess adding a request context/ID

  layer that threads through the entire request lifecycle. Tests Rust

  trait analysis, Tower middleware comprehension, and layered

  architecture understanding.

  '
steps:
- name: Find all Handler trait implementations
  prompt: 'You''re about to add a new Handler variant in axum. Hand the next agent
    every Handler impl with file:line, the type-state markers (T, S), how extractors
    run inside each impl, and where the user''s closure is actually invoked. Read
    axum/src/handler/mod.rs, axum/src/routing/mod.rs, axum/src/routing/method_routing.rs
    as starting points but enumerate every impl, not just those three files. The follow-up
    agent should need only small, targeted lookups — not a fresh exploration of the
    crate. '
  checks:
  - type: word
    value: IntoResponseHandler
    required: true
  - type: word
    value: Layered
    required: true
  - type: response_richness
    value: '4'
    required: true
    description: Referenced 4+ files in Handler impl analysis
  - type: word
    value: all_the_tuples
    required: false
  - type: contains
    value: handler/mod.rs
    required: false
  - type: word
    value: HandlerCallWithExtractors
    required: false
    description: Found the axum-extra Handler extension trait via structural search
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
    description: Used structural graph query for Handler trait analysis
- name: Trace the extractor chain
  prompt: 'You''re about to write a new extractor in axum. Map the extractor system
    for the next agent: FromRequestParts vs FromRequest with file:line, how State
    uses FromRef, what happens on rejection (and how the rejection type is plumbed
    back), and at least 8 built-in extractors with their file locations. The follow-up
    agent should need only small, targeted lookups — not a fresh exploration of the
    crate. '
  checks:
  - type: word
    value: FromRequestParts
    required: true
  - type: word
    value: FromRequest
    required: true
  - type: response_richness
    value: '5'
    required: true
    description: Referenced 5+ files in extractor analysis
  - type: word
    value: FromRef
    required: false
  - type: word
    value: Extension
    required: false
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
    description: Used semantic search for extractor system analysis
- name: Trace the full serve-to-response lifecycle
  prompt: 'You''re about to add request-scoped middleware in axum. Trace the full
    request lifecycle for the next agent so they can insert at the correct layer:
    from axum::serve() through accept, make_service, Router.call_with_state, PathRouter,
    MethodRouter, Handler::call, IntoResponse — all 7 layers. List key method names
    and source files at each layer. The follow-up agent should need only small, targeted
    lookups — not a fresh exploration of the crate. '
  checks:
  - type: word
    value: call_with_state
    required: true
  - type: response_richness
    value: '4'
    required: true
    description: Referenced 4+ files across the full lifecycle
  - type: word
    value: PathRouter
    required: false
  - type: word
    value: MethodRouter
    required: false
  - type: word
    value: TowerToHyperService
    required: false
    description: Named the Tower-to-hyper bridge type in the serve pipeline
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
    description: Used semantic search to trace serve-to-response lifecycle
- name: Assess adding a request context layer
  prompt: 'You''re about to add a request ID/tracing context every handler can extract
    in axum. Produce the edit map: pick the least-breaking approach (Extension layer,
    Handler trait modification, new extractor type) with file:line for each touched
    site, name the tradeoffs in terms of axum''s actual surfaces (Router::layer vs
    route_layer, MatchedPath precedent). The follow-up agent should need only small,
    targeted lookups — not a fresh exploration of the crate. '
  checks:
  - type: word
    value: Extension
    required: true
  - type: word
    value: Handler
    required: true
  - type: word
    value: Router
    required: false
  - type: word
    value: tower
    required: false
  - type: word
    value: MatchedPath
    required: false
    description: Cited MatchedPath as architectural precedent for request context
      extractors
  - type: word
    value: route_layer
    required: false
    description: Distinguished route_layer from Router::layer for middleware scoping
scoring:
  weights:
    correctness: 0.7
    efficiency: 0.3
