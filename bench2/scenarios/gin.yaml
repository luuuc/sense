name: Gin middleware chain tracing and recovery modification assessment
repo: gin
description: 'Trace the Gin HTTP request dispatch from Engine.ServeHTTP through

  the radix tree router to handler execution. Understand the middleware

  chain (Context.Next, Context.Abort) and then assess modifying the

  recovery middleware to add request ID injection. Tests structural

  tracing of Go HTTP frameworks, middleware flow comprehension, and

  safe modification planning.

  '
steps:
- name: Trace HTTP dispatch from entry point
  prompt: "Read gin.go, routergroup.go, context.go, and tree.go. Trace the full\n\
    HTTP request dispatch pipeline starting from Engine.ServeHTTP.\nFor every method\
    \ in the chain, list:\n  - The Go file and the struct/type it belongs to\n  -\
    \ What it does\n  - What it calls next\n\nThe chain is roughly: ServeHTTP → handleHTTPRequest\
    \ → route tree\nlookup → handler execution. Include all intermediate methods like\n\
    updateRouteTrees, serveError, redirect handlers.\n"
  checks:
  - type: contains
    value: Engine.ServeHTTP
    required: true
  - type: contains
    value: handleHTTPRequest
    required: true
  - type: word
    value: gin.go
    required: true
  - type: response_richness
    value: '4'
    required: true
    description: Referenced 4+ unique source files in dispatch trace
  - type: word
    value: context.go
    required: false
  - type: word
    value: tree.go
    required: false
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
    description: Used structural graph query for dispatch chain tracing
- name: Understand middleware flow
  prompt: "In Gin, middleware functions call `c.Next()` to pass control to\nthe next\
    \ handler in the chain. Read context.go and explain:\n  - Where Context.Next and\
    \ Context.Abort are defined\n  - How the handler chain is built (the `handlers`\
    \ slice on Context)\n  - Where Next actually executes the next handler\n  - What\
    \ Abort does and how it prevents further execution\n\nThen find every internal\
    \ caller of Context.Next and Context.Abort\nin production code (not test files).\
    \ List each with file:line.\n"
  checks:
  - type: contains
    value: Context.Next
    required: true
  - type: contains
    value: Context.Abort
    required: true
  - type: response_richness
    value: '4'
    required: true
    description: Surfaced Next/Abort callers in 4+ files
  - type: word
    value: handlers
    required: false
  - type: word
    value: recovery.go
    required: false
  - type: word
    value: logger.go
    required: false
  - type: word
    value: abortIndex
    required: false
    description: Named the internal constant controlling how Abort halts execution
  - type: word
    value: combineHandlers
    required: false
    description: Named the handler chain construction method in routergroup.go
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
    description: Used structural graph query for Context.Next/Abort caller analysis
- name: Find dead code in the gin package
  prompt: 'Find symbols (functions, types, methods) in the main gin package

    (root directory, all .go files except _test.go) that are defined

    but NEVER referenced anywhere else in the codebase. Focus on

    unexported (lowercase) symbols.

    '
  checks:
  - type: word
    value: localhostIP
    required: false
  - type: contains
    value: dead
    required: false
    description: Used dead code terminology in dead code analysis
  - type: response_richness
    value: '3'
    required: false
    description: Referenced 3+ files in dead-code analysis
  - type: no_grep
    value: no_grep
    required: false
    layer: adoption
  - type: mcp_tool_used
    value: sense_graph
    required: false
    layer: adoption
    description: Used structural graph query for dead code detection
  - type: contains
    value: binding
    required: false
    description: Found dead code in sub-packages beyond the root gin directory
- name: Assess modifying the recovery middleware
  prompt: 'Read recovery.go. You want to modify Recovery/CustomRecovery to

    inject a unique request ID into the Gin context before the handler

    chain runs. What do you need to know?

    Cover: call hierarchy, who calls these functions, where they''re

    registered, and which signatures are public API.

    Name specific functions, files, and line numbers.

    '
  checks:
  - type: word
    value: Recovery
    required: true
  - type: word
    value: recovery.go
    required: true
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in modification assessment
  - type: word
    value: CustomRecovery
    required: false
  - type: word
    value: CustomRecoveryWithWriter
    required: false
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
    description: Used blast radius analysis for modification impact
  - type: word
    value: Default
    required: false
    description: Named gin.Default as the automatic registration site for Recovery
  - type: word
    value: BasicAuthForRealm
    required: false
    description: Transitive Abort caller via AbortWithStatus — requires multi-hop traversal
scoring:
  weights:
    correctness: 0.70
    efficiency: 0.30
