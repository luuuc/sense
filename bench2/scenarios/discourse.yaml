name: Discourse topic creation flow and authorization tracing
repo: discourse
description: 'Trace the Discourse topic creation flow from the HTTP controller

  through service objects to database persistence. Understand the

  Guardian authorization system and then assess the impact of

  adding a new permission check to the topic creation pipeline.

  '
steps:
- name: Orient in the Discourse codebase
  prompt: 'I just cloned Discourse and need to understand its architecture.

    Give me a high-level orientation: what it does, structure, key

    abstractions (Guardians, services, serializers), and where to

    start reading. Read key files when useful. No Explore agents.

    '
  checks:
  - type: word
    value: Guardian
    required: true
  - type: word
    value: Topic
    required: true
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in orientation
  - type: word
    value: service
    required: false
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
    description: Used semantic search for Guardian/authorization orientation
- name: Trace topic creation from controller to persistence
  prompt: 'Trace the topic creation flow from TopicsController#create through

    TopicCreator and PostCreator service objects to database persistence.

    For each method: file path, class, what it does, what it calls next.

    '
  checks:
  - type: word
    value: TopicsController
    required: true
  - type: word
    value: TopicCreator
    required: true
  - type: word
    value: PostCreator
    required: true
  - type: response_richness
    value: '5'
    required: true
    description: Referenced 5+ files in the creation flow trace
  - type: word
    value: PostsController
    required: true
    description: Named the actual HTTP entry point for topic creation
  - type: no_grep
    value: no_grep
    required: false
    layer: adoption
  - type: word
    value: NewPostManager
    required: false
    description: Named the intermediary routing layer between controller and PostCreator
  - type: mcp_tool_used
    value: sense_search
    required: false
    layer: adoption
    description: Used semantic search for topic creation flow tracing
- name: Understand Guardian authorization
  prompt: 'Find how Guardian is used in the topic creation path. Where is it

    instantiated? Which Guardian methods are called? What permission

    checks gate topic creation? Read lib/guardian.rb and guardian

    concern files.

    '
  checks:
  - type: word
    value: topic_guardian
    required: true
  - type: word
    value: can_create_topic
    required: true
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in Guardian analysis
  - type: contains
    value: ensure
    required: false
  - type: word
    value: can_create_topic_on_category
    required: false
    description: Named the intermediate Guardian method in the permission chain
  - type: word
    value: CurrentUserSerializer
    required: true
    description: Connected Guardian permissions to frontend serialization layer
- name: Assess impact of adding a permission check
  prompt: 'You need to add a permission: only users who have been members

    for >24 hours can create topics. Which Guardian method changes,

    where inserted in the create flow, what specs need updating,

    what other paths are affected? Be specific about file:line.

    '
  checks:
  - type: word
    value: Guardian
    required: true
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in impact assessment
  - type: word
    value: spec
    required: false
  - type: word
    value: plugin
    required: false
  - type: mcp_tool_used
    value: sense_blast
    required: false
    layer: adoption
    description: Used blast radius analysis for permission change impact
  - type: contains
    value: spam_rules_spec
    required: false
    description: Warned about specific test breakage from permission change
  - type: contains
    value: reply_as_new_topic
    required: false
    description: Identified permission gap in topic reply path
  - type: contains
    value: queue
    required: false
    description: Flagged queue-vs-reject behavioral impact
scoring:
  weights:
    correctness: 0.70
    efficiency: 0.30
