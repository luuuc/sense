name: Javalin servlet dispatch and custom error handler registration
repo: javalin
description: 'Trace the Javalin HTTP request dispatch from JavalinServlet through

  the routing engine to handler execution. Understand how routes are

  configured and then assess adding a custom error handler.

  '
steps:
- name: Orient in the Javalin codebase
  prompt: 'I just cloned Javalin and need to understand its architecture.

    Read key source files. Give me a high-level orientation: what it

    does, key classes (Javalin, JavalinServlet, Context, Handler),

    how a route gets registered and dispatched. No Explore agents.

    '
  checks:
  - type: contains
    value: JavalinServlet
    required: true
  - type: response_richness
    value: '4'
    required: true
    description: Referenced 4+ files in orientation
  - type: contains
    value: Handler
    required: false
  - type: contains
    value: Context
    required: false
  - type: mcp_tool_used
    value: sense_graph
    required: false
    description: Used structural graph query for codebase orientation
- name: Trace HTTP dispatch from JavalinServlet.service
  prompt: 'Trace the service() method and follow the full dispatch chain:

    request parsing, router matching, before/after filters, handler

    execution, response production. List every method with file paths.

    '
  checks:
  - type: word
    value: service
    required: true
  - type: contains
    value: JavalinServlet
    required: true
  - type: response_richness
    value: '5'
    required: true
    description: Referenced 5+ files in dispatch trace
  - type: no_grep
    value: no_grep
    required: false
  - type: mcp_tool_used
    value: sense_search
    required: false
    description: Used semantic search for dispatch chain tracing
- name: Trace route registration and find test files
  prompt: 'Trace how app.get("/hello", ...) gets registered from Javalin.get()

    through to the routing table. Find test files testing HTTP dispatch

    and routing. List test file paths and key test method names.

    '
  checks:
  - type: contains
    value: route
    required: false
  - type: contains
    value: get
    required: false
  - type: word
    value: test
    required: false
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in route/test analysis
- name: Assess adding a custom error handler
  prompt: 'You need to add an error() handler that catches all unhandled

    exceptions and logs request URL, method, and timestamp before

    returning JSON. Where does error handling currently occur?

    How are existing error handlers structured? Which files need

    modification? Would before/after filters be affected?

    '
  checks:
  - type: contains
    value: error
    required: true
  - type: response_richness
    value: '4'
    required: false
    description: Referenced 4+ files in error handling assessment
  - type: contains
    value: exception
    required: false
scoring:
  weights:
    completeness: 0.4
    efficiency: 0.25
    tool_fluency: 0.2
    discoverability: 0.15
  metrics:
  - token_input_uncached
  - token_output
  - token_total_billed
  - wall_time
  - tool_calls
  - grep_count
  - read_count
  - mcp_count
  - cost_usd
