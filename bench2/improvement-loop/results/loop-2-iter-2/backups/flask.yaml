name: Flask WSGI dispatch trace and debug instrumentation
repo: flask
description: 'Trace the Flask WSGI request dispatch pipeline end-to-end, locate

  the test coverage for the core dispatch, then assess what would

  break if you added a debug parameter to wsgi_app. A realistic

  pre-refactoring task that tests call-graph traversal, test-file

  mapping, and impact awareness.

  '
steps:
- name: Trace the request dispatch pipeline
  prompt: "Read src/flask/app.py and trace the Flask request dispatch pipeline.\n\
    Starting from `Flask.wsgi_app`, list every method it calls in order\nthrough to\
    \ `finalize_request`. For each method, list:\n  - The file and line where it is\
    \ defined\n  - What it does in one sentence\n  - Which methods it calls next\n\
    \nDo not use Explore agents. Be thorough — follow the full chain:\nwsgi_app →\
    \ full_dispatch_request → preprocess_request →\ndispatch_request → finalize_request\
    \ → make_response →\nprocess_response\n"
  checks:
  - type: word
    value: wsgi_app
    required: true
    description: Core dispatch entry point
  - type: word
    value: full_dispatch_request
    required: true
    description: Main dispatch orchestrator
  - type: word
    value: preprocess_request
    required: true
    description: URL preprocessors + before_request chain
  - type: word
    value: dispatch_request
    required: true
    description: URL rule match → view function call
  - type: word
    value: finalize_request
    required: true
    description: Response building + after_request chain
  - type: word
    value: make_response
    required: true
    description: Return value → Response conversion
  - type: word
    value: process_response
    required: true
    description: Session save + response finalisation
  - type: response_richness
    value: '2'
    required: true
    description: Referenced 5+ unique source files in the trace
  - type: word
    value: app.py
    required: false
    description: Identified the primary source file
  - type: contains
    value: wsgi_app calls full_dispatch_request
    required: false
    description: Demonstrates the dispatch chain connection, not just keyword presence
- name: Find internal callers of wsgi_app
  prompt: 'Find ALL internal callers of `Flask.wsgi_app` within the Flask

    source code (src/flask/). Exclude test files. For each caller,

    list the file path, line number, and the enclosing function or

    method name.

    '
  checks:
  - type: word
    value: __call__
    required: true
    description: Flask.__call__ is the internal caller
  - type: contains
    value: wsgi_app
    required: true
    description: Mentions wsgi_app in caller analysis
  - type: response_richness
    value: '2'
    required: false
    description: Found callers across 3+ files
  - type: no_grep
    value: no_grep
    required: false
    description: Used structural tools, not raw grep
  - type: mcp_tool_used
    value: sense_graph
    required: false
    description: Used structural call graph to find wsgi_app callers
- name: Locate test coverage for the dispatch pipeline
  prompt: 'Find the test files that cover Flask.wsgi_app and the dispatch

    pipeline methods. Look under tests/ for tests related to basic

    app behavior, request dispatching, and WSGI functionality.

    List each relevant test file path and the key test function

    names inside it.

    '
  checks:
  - type: word
    value: test_basic.py
    required: true
    description: Main test file for basic app behavior
  - type: word
    value: conftest.py
    required: true
    description: Test fixtures for app creation
  - type: response_richness
    value: '2'
    required: true
    description: Referenced 3+ test files
  - type: contains
    value: test_
    required: false
    description: Identified specific test functions
- name: Assess impact of adding a debug parameter
  prompt: "If you changed the signature of `Flask.wsgi_app` to add a new\nkeyword-only\
    \ parameter `_trace: bool = False`, what would break?\nList:\n  - Every file that\
    \ would need modification\n  - Every symbol/function that would be directly affected\n\
    \  - Any subclass or middleware compatibility concerns\n  - Whether the internal\
    \ __call__ method needs updating\nBe specific about file:line locations.\n"
  checks:
  - type: word
    value: __call__
    required: true
    description: Identified __call__ needs updating
  - type: word
    value: wsgi_app
    required: true
    description: Discussed wsgi_app signature implications
  - type: response_richness
    value: '2'
    required: false
    description: Referenced 4+ files in impact assessment
  - type: contains
    value: subclass
    required: false
    description: Flagged subclassing compatibility concern
  - type: contains
    value: middleware
    required: false
    description: Considered middleware wrapping pattern
  - type: word
    value: FlaskClient
    required: false
    description: Identified FlaskClient in testing.py as affected by wsgi_app signature
      change
  - type: mcp_tool_used
    value: sense_blast
    required: false
    description: Used blast radius analysis for wsgi_app signature change impact
scoring:
  weights:
    completeness: 0.4
    efficiency: 0.25
    tool_fluency: 0.2
    discoverability: 0.15
  metrics:
  - token_input_uncached
  - token_output
  - token_total_billed
  - wall_time
  - tool_calls
  - grep_count
  - read_count
  - mcp_count
  - cost_usd
