name: Next.js SSR render path tracing and request ID threading
repo: nextjs
description: 'Trace the Next.js SSR rendering pipeline from HTTP request entry

  through component loading to HTML generation. Understand the layered

  architecture and assess threading a request ID through the pipeline.

  '
steps:
- name: Orient in the Next.js server architecture
  prompt: 'Read next-server.ts, base-server.ts, and key entry points.

    Give me a high-level orientation: key server classes, major

    subdirectories (app-render, route-modules, response-cache),

    Pages vs App Router rendering. No Explore agents.

    '
  checks:
  - type: word
    value: NextNodeServer
    required: true
  - type: word
    value: BaseServer
    required: true
  - type: response_richness
    value: '4'
    required: true
    description: Referenced 4+ files in orientation
  - type: contains
    value: app-render
    required: false
  - type: contains
    value: Pages
    required: false
- name: Trace the SSR request lifecycle
  prompt: 'Starting from a raw HTTP request, trace the full Next.js SSR

    pipeline: request entry, routing, loadComponents, Pages Router

    renderToHTMLImpl, App Router renderToHTMLOrFlight.

    List key files and method calls at each layer.

    '
  checks:
  - type: word
    value: handleRequest
    required: true
  - type: word
    value: renderToHTML
    required: true
  - type: response_richness
    value: '6'
    required: true
    description: Referenced 6+ files across the SSR pipeline
  - type: word
    value: loadComponents
    required: false
  - type: word
    value: findPageComponents
    required: false
  - type: word
    value: render.tsx
    required: false
  - type: no_grep
    value: no_grep
    required: false
- name: Find callers of renderToHTMLOrFlight
  prompt: 'Find ALL callers of renderToHTMLOrFlight. List each with file

    path, line number, enclosing function/class, and whether it''s

    in app-render, route-modules, or next-server. Also identify

    what exports it and from which file.

    '
  checks:
  - type: contains
    value: renderToHTMLOrFlight
    required: true
  - type: contains
    value: app-render
    required: true
  - type: response_richness
    value: '3'
    required: false
    description: Referenced 3+ files in caller analysis
  - type: contains
    value: route-modules
    required: false
- name: Assess where to thread a request ID
  prompt: 'You need to add an X-Request-Id header to every Next.js response,

    generated early in the request lifecycle and available throughout

    rendering. Where? How to propagate? RequestMeta vs AsyncLocalStorage?

    How does response-cache interact? Which test files need updates?

    Name specific files, classes, and methods.

    '
  checks:
  - type: contains
    value: RequestMeta
    required: true
  - type: word
    value: handleRequest
    required: true
  - type: response_richness
    value: '5'
    required: false
    description: Referenced 5+ files in request-ID assessment
  - type: contains
    value: cache
    required: false
scoring:
  weights:
    completeness: 0.40
    efficiency: 0.25
    tool_fluency: 0.20
    discoverability: 0.15
  metrics:
  - token_input_uncached
  - token_output
  - token_total_billed
  - wall_time
  - tool_calls
  - grep_count
  - read_count
  - mcp_count
  - cost_usd
